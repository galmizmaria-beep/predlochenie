<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор игры: Синтаксический разбор</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;600;800&family=Montserrat:wght@500;700&family=Comfortaa:wght@700&family=Roboto:wght@400;500;700&family=Russo+One&display=swap&subset=cyrillic" rel="stylesheet">
    <style>
        :root {
            --bg-top: #658c98; --bg-clouds: #e9f4f7; --paper-bg: #fdf5eb;
            --accent-red: #d46b54; --text-dark: #4a3b52;
        }
        body { margin: 0; padding: 0; font-family: 'Nunito', sans-serif; background-color: var(--bg-clouds); color: var(--text-dark); }
        
        .header { background-color: var(--bg-top); padding: 20px 20px 40px 20px; text-align: center; position: relative; margin-bottom: 20px;}
        .header h1 { font-family: 'Caveat', cursive; color: white; font-size: 2.5rem; margin: 0; }
        .clouds-divider { position: absolute; bottom: -1px; left: 0; width: 100%; height: 40px; background-image: radial-gradient(circle at 20px 0, transparent 20px, var(--bg-clouds) 21px); background-size: 40px 100%; background-repeat: repeat-x; }
        
        /* Сетка конструктора */
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1500px; margin: 0 auto; padding: 0 20px 40px 20px; align-items: start; }
        
        @media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } }

        .panel { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: var(--accent-red); margin-top: 0; border-bottom: 2px dashed #eee; padding-bottom: 10px; font-size: 1.3rem;}
        .step { border-left: 4px solid var(--accent-red); padding-left: 15px; margin-bottom: 25px; }
        
        textarea, select, input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; font-family: inherit; font-size: 1rem; box-sizing: border-box; margin-top: 10px; }
        input[type="color"] { height: 45px; padding: 2px; cursor: pointer; }
        button { background-color: var(--accent-red); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-green { background-color: #4CAF50; width: 100%; padding: 15px; font-size: 1.2rem; margin-top: 10px;}
        
        #word-mapper { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .word-setup-card { background: var(--paper-bg); padding: 15px; border-radius: 10px; border: 1px solid #ddd; text-align: center;}
        .word-setup-card strong { display: block; margin-bottom: 10px; font-size: 1.2rem; color: var(--accent-red); }
        
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        
        /* Зона превью (Строго 16:9) */
        .preview-sticky { position: sticky; top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .preview-wrapper { width: 100%; aspect-ratio: 16 / 9; border: 4px dashed #90a4ae; border-radius: 15px; background: white; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative;}
        iframe { width: 100%; height: 100%; border: none; display: block;}
        
        #code-output { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }
        .copy-btn { background-color: #2196F3; font-size: 1.2rem; padding: 15px; width: 100%; border-radius: 15px;}
        .copy-btn:hover { background-color: #1976D2; box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4); }

        .preview-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 10px; font-size: 0.8rem; pointer-events: none; z-index: 100; font-weight: bold;}
    </style>
</head>
<body>

    <div class="header">
        <h1>Конструктор: Синтаксический разбор</h1>
        <div class="clouds-divider"></div>
    </div>

    <div class="main-layout">
        
        <!-- ЛЕВАЯ КОЛОНКА -->
        <div class="left-panel">
            <div class="panel">
                <h2>1. Настройки дизайна (Игра 16:9)</h2>
                <div class="settings-grid">
                    <div><label>Цвет фона:</label><input type="color" id="set-bg" value="#f4f9f9" onchange="generateGame()"></div>
                    <div><label>Цвет кнопок:</label><input type="color" id="set-btn" value="#5c8a8a" onchange="generateGame()"></div>
                    <div><label>Кнопка "Проверить":</label><input type="color" id="set-btn-check" value="#e67e22" onchange="generateGame()"></div>
                    <div><label>Свечение:</label><input type="color" id="set-glow" value="#a2d9ce" onchange="generateGame()"></div>
                    <div><label>Шрифт предложения:</label>
                        <select id="set-font" onchange="generateGame()">
                            <option value="'Nunito', sans-serif">Nunito (Аккуратный)</option>
                            <option value="'Montserrat', sans-serif">Montserrat (Строгий)</option>
                            <option value="'Comfortaa', cursive">Comfortaa (Округлый)</option>
                            <option value="'Caveat', cursive">Caveat (Рукописный)</option>
                            <option value="'Russo One', sans-serif">Russo One (Жирный)</option>
                        </select>
                    </div>
                    <div><label>Размер текста:</label>
                        <select id="set-size" onchange="generateGame()">
                            <option value="16px">Стандартный (16px)</option>
                            <option value="18px" selected>Крупный (18px)</option>
                            <option value="20px">Очень крупный (20px)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>2. Ввод предложения</h2>
                <div class="step">
                    <label>Введите предложение и нажмите "Разбить":</label>
                    <textarea id="sentence-input" rows="2">Наступила золотая осень.</textarea>
                    <button onclick="parseWords()">Разбить на слова</button>
                </div>

                <div class="step" id="step-words" style="display:none;">
                    <label>Укажите роль и часть речи для каждого слова:</label>
                    <div id="word-mapper"></div>
                </div>
            </div>

            <div class="panel">
                <h2>3. Характеристики предложения</h2>
                <div class="settings-grid">
                    <div><label>По цели:</label><select id="ans-celi" onchange="generateGame()"><option value="повествовательное">Повествовательное</option><option value="вопросительное">Вопросительное</option><option value="побудительное">Побудительное</option></select></div>
                    <div><label>По интонации:</label><select id="ans-int" onchange="generateGame()"><option value="невосклицательное">Невосклицательное</option><option value="восклицательное">Восклицательное</option></select></div>
                    <div><label>Грамм. основы:</label><select id="ans-osnov" onchange="generateGame()"><option value="простое">Простое</option><option value="сложное">Сложное</option></select></div>
                    <div><label>Второстеп. члены:</label><select id="ans-raspr" onchange="generateGame()"><option value="распространённое">Распространённое</option><option value="нераспространённое">Нераспространённое</option></select></div>
                    <div><label>Главные члены:</label><select id="ans-chlen" onchange="toggleSubOdno(); generateGame()"><option value="двусоставное">Двусоставное</option><option value="односоставное">Односоставное</option></select></div>
                    <div id="sub-indigo-wrap" style="display:none;"><label>Тип односост.:</label><select id="ans-sub" onchange="generateGame()"><option value="назывное">Назывное</option><option value="определённо-личное">Опред.-личное</option><option value="неопределённо-личное">Неопред.-личное</option><option value="безличное">Безличное</option></select></div>
                </div>
                <button class="btn-green" onclick="generateGame()">Обновить предпросмотр</button>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА -->
        <div class="right-panel">
            <div class="preview-sticky">
                <div class="preview-wrapper">
                    <div class="preview-label">Предпросмотр игры (Формат 16:9)</div>
                    <iframe id="preview-frame"></iframe>
                </div>
                
                <p style="font-size: 0.95rem; color: #555; margin: 0; line-height: 1.4;">Нажмите кнопку ниже. Затем в Genially выберите <b>Insert -> Others -> HTML code</b>, вставьте код и растяните блок на весь слайд.</p>
                
                <textarea id="code-output" readonly></textarea>
                <button id="copy-btn" class="copy-btn" onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
            </div>
        </div>

    </div>

    <script>
        let wordsArray = [];
        const partsOfSpeech = ["существительное", "прилагательное", "числительное", "местоимение", "глагол", "причастие", "деепричастие", "наречие", "союз", "предлог", "частица", "междометие", "нет"];

        function parseWords() {
            let text = document.getElementById('sentence-input').value.trim();
            wordsArray = text.split(/\s+/);
            const mapper = document.getElementById('word-mapper');
            mapper.innerHTML = '';
            
            let posOptions = partsOfSpeech.map(p => `<option value="${p}">${p}</option>`).join('');

            wordsArray.forEach((word, index) => {
                mapper.innerHTML += `
                    <div class="word-setup-card">
                        <strong>${word}</strong>
                        <select id="role-${index}" onchange="generateGame()" style="margin-top:2px; margin-bottom:5px; padding:5px; font-size: 0.9rem;">
                            <option value="none">Нет (предлог/союз)</option>
                            <option value="subject">Подлежащее</option>
                            <option value="predicate">Сказуемое</option>
                            <option value="object">Дополнение</option>
                            <option value="attribute">Определение</option>
                            <option value="adverbial">Обстоятельство</option>
                        </select>
                        <select id="pos-${index}" onchange="generateGame()" style="margin-top:2px; padding:5px; font-size: 0.9rem;">
                            ${posOptions}
                        </select>
                    </div>
                `;
            });
            document.getElementById('step-words').style.display = 'block';
            
            if (text === "Наступила золотая осень.") {
                if (document.getElementById('role-0')) document.getElementById('role-0').value = "predicate";
                if (document.getElementById('pos-0')) document.getElementById('pos-0').value = "глагол";
                if (document.getElementById('role-1')) document.getElementById('role-1').value = "attribute";
                if (document.getElementById('pos-1')) document.getElementById('pos-1').value = "прилагательное";
                if (document.getElementById('role-2')) document.getElementById('role-2').value = "subject";
                if (document.getElementById('pos-2')) document.getElementById('pos-2').value = "существительное";
            }
            generateGame();
        }

        function toggleSubOdno() {
            const val = document.getElementById('ans-chlen').value;
            document.getElementById('sub-indigo-wrap').style.display = val === 'односоставное' ? 'block' : 'none';
        }

        function copyCode() {
            const code = document.getElementById('code-output');
            code.select();
            document.execCommand('copy');
            
            const btn = document.getElementById('copy-btn');
            const originalText = btn.innerText;
            btn.innerText = '✅ КОД СКОПИРОВАН!';
            btn.style.backgroundColor = '#4CAF50';
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = '#2196F3';
            }, 3000);
        }

        function generateGame() {
            if (wordsArray.length === 0) return;

            const correctData = { roles: {}, pos: {} };
            wordsArray.forEach((_, index) => {
                correctData.roles[index] = document.getElementById(`role-${index}`).value;
                correctData.pos[index] = document.getElementById(`pos-${index}`).value;
            });

            const config = {
                correct: correctData,
                chars: {
                    celi: document.getElementById('ans-celi').value,
                    int: document.getElementById('ans-int').value,
                    osnov: document.getElementById('ans-osnov').value,
                    raspr: document.getElementById('ans-raspr').value,
                    chlen: document.getElementById('ans-chlen').value,
                    sub: document.getElementById('ans-chlen').value === 'односоставное' ? document.getElementById('ans-sub').value : ''
                },
                styles: {
                    bg: document.getElementById('set-bg').value,
                    btn: document.getElementById('set-btn').value,
                    btnCheck: document.getElementById('set-btn-check').value,
                    glow: document.getElementById('set-glow').value,
                    font: document.getElementById('set-font').value,
                    size: document.getElementById('set-size').value
                }
            };

            const posOptionsHTML = `<option value="none">Часть речи...</option>` + partsOfSpeech.map(p => `<option value="${p}">${p}</option>`).join('');
            const wordsHtml = wordsArray.map((w, i) => `
                <div class="word-col">
                    <select class="student-pos" data-index="${i}">${posOptionsHTML}</select>
                    <span class="word-drop" data-index="${i}">${w}</span>
                </div>
            `).join('');

            const safeConfigString = JSON.stringify(config);

            // ИСПРАВЛЕННЫЙ ВЫВОД: Оборачиваем в единый div и помещаем <style> внутрь, чтобы Genially не вырезал его.
            const studentHTML = `<div id="syntax-game-wrapper" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: ${config.styles.bg}; box-sizing: border-box;">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;600;800&family=Montserrat:wght@500;700&family=Comfortaa:wght@700&family=Roboto:wght@400;500;700&family=Russo+One&display=swap&subset=cyrillic');
        
        #syntax-game-wrapper *, #syntax-game-wrapper *::before, #syntax-game-wrapper *::after { 
            box-sizing: border-box; 
        }
        
        .game-container { 
            width: 100%; 
            height: 100%;
            font-family: ${config.styles.font}, 'Nunito', sans-serif; 
            color: #333; 
            overflow: hidden; 
            display: flex;
        }
        
        /* ЛЕВАЯ КОЛОНКА */
        .game-left { 
            flex: 1.3; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            border-right: 3px dashed rgba(0,0,0,0.1); 
            height: 100%; 
        }
        
        /* ПРАВАЯ КОЛОНКА */
        .game-right { 
            flex: 1; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            background: rgba(255,255,255,0.4); 
            height: 100%;
        }

        .sentence-box { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 12px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px 10px; 
            align-items: flex-end; 
            font-size: ${config.styles.size}; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            border: 1px solid #eee;
            flex-shrink: 0;
        }
        
        .word-col { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
            min-height: 70px;
            justify-content: flex-end;
        }
        
        .student-pos { 
            font-family: inherit; 
            font-size: 0.7em; 
            padding: 3px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            background: white; 
            width: 110px; 
            cursor: pointer; 
        }
        .student-pos.correct { background: #c8e6c9 !important; border-color: #4CAF50 !important; }
        .student-pos.wrong { background: #ffcdd2 !important; border-color: #f44336 !important; }
        
        .word-drop { 
            font-family: inherit; 
            padding: 3px 6px; 
            border-radius: 5px; 
            border: 2px solid transparent; 
            cursor: pointer; 
            font-size: 1.2em; 
            position: relative; 
            user-select: none; 
            display: inline-block;
        }
        
        /* Линии разбора */
        .ans-subject { border-bottom: 2px solid #333; border-radius: 0; }
        .ans-predicate { border-bottom: 4px double #333; border-radius: 0; }
        .ans-object { border-bottom: 2px dashed #333; border-radius: 0; }
        .ans-attribute { text-decoration: underline wavy #333 2px; text-underline-offset: 4px; border: none; }
        .ans-adverbial { background-image: repeating-linear-gradient(to right, #333 0, #333 8px, transparent 8px, transparent 12px, #333 12px, #333 16px, transparent 16px, transparent 20px); background-position: bottom; background-size: 100% 2px; background-repeat: no-repeat; padding-bottom: 4px; border: none; }
        
        .word-drop.correct-line { color: #1b5e20 !important; }
        .word-drop.ans-subject.correct-line, .word-drop.ans-predicate.correct-line, .word-drop.ans-object.correct-line { border-bottom-color: #4CAF50 !important; }
        .word-drop.ans-attribute.correct-line { text-decoration-color: #4CAF50 !important; }
        .word-drop.ans-adverbial.correct-line { background-image: repeating-linear-gradient(to right, #4CAF50 0, #4CAF50 8px, transparent 8px, transparent 12px, #4CAF50 12px, #4CAF50 16px, transparent 16px, transparent 20px) !important; background-position: bottom !important; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .error-shake { animation: shake 0.4s; background: rgba(244, 67, 54, 0.2) !important; border-radius: 5px !important;}

        /* Панель инструментов */
        .tools-hint { text-align: center; font-size: 0.8em; color: #555; margin-bottom: 8px; flex-shrink: 0; }
        .drag-tools { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 12px; flex-shrink: 0;}
        .drag-item { background: white; padding: 6px 12px; border-radius: 8px; cursor: grab; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.8em; font-weight: bold; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); user-select: none; touch-action: none;}
        
        .drag-clone { position: fixed !important; pointer-events: none !important; opacity: 0.9; z-index: 9999; margin: 0; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transform: translate(-50%, -50%); border: 2px solid ${config.styles.btn}; background: white; padding: 6px 12px; border-radius: 8px; }
        .demo-line { width: 30px; height: 10px; margin-top: 2px;}
        .line-sub { border-bottom: 2px solid #333; } .line-pred { border-bottom: 4px double #333; } .line-obj { border-bottom: 2px dashed #333; } .line-attr { text-decoration: underline wavy #333 2px; text-underline-offset: -5px; color: transparent; } .line-attr::after { content: "___"; color: transparent; } .line-adv { height: 2px; margin-top: 8px; background-image: repeating-linear-gradient(to right, #333 0, #333 8px, transparent 8px, transparent 12px, #333 12px, #333 16px, transparent 16px, transparent 20px); }

        /* Характеристики */
        .char-panel { 
            background: white; 
            border-radius: 12px; 
            padding: 12px; 
            border: 1px solid #eee; 
            margin-bottom: 12px;
            flex-grow: 1;
            overflow-y: auto;
        }
        .char-row { margin-bottom: 12px; }
        .char-title { font-weight: bold; margin-bottom: 4px; color: #555; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.5px; }
        .tags-group { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag-btn { background: #f8f9fa; border: 1px solid #ccc; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 0.8em; font-weight: 600; transition: 0.2s; color: #444;}
        .tag-btn:hover { background: #eee; }
        .tag-btn.selected { background: #e3f2fd; border-color: #2196F3; color: #1565C0; }
        .tag-btn.correct-tag { background: #4CAF50 !important; border-color: #4CAF50 !important; color: white !important; }
        .tag-btn.wrong-tag { background: #f44336 !important; border-color: #f44336 !important; color: white !important; }
        #sub-odno { display: none; margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.03); border-radius: 8px; border-left: 3px solid ${config.styles.btn}; }
        #sub-odno.show { display: block; }

        /* Кнопка проверить */
        .check-btn-wrap { display: flex; justify-content: center; margin-top: auto; padding-top: 5px; padding-bottom: 5px; flex-shrink: 0; }
        .check-btn { background: ${config.styles.btnCheck}; color: white; border: none; padding: 10px 30px; border-radius: 25px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4); width: 100%; max-width: 300px;}
        
        /* Правая колонка (Рисовалка) */
        .canvas-header { font-weight: bold; color: ${config.styles.btn}; font-size: 1.1em; margin-bottom: 8px; text-align: center; flex-shrink: 0; }
        .canvas-container { 
            flex-grow: 1; 
            border: 3px dashed #b0bec5; 
            border-radius: 12px; 
            background: white; 
            position: relative; 
            overflow: hidden; 
            min-height: 150px;
        }
        canvas { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; 
            cursor: crosshair; touch-action: none; display: block; 
        }
        .clear-btn { 
            background: #fff; border: 2px solid ${config.styles.btn}; color: ${config.styles.btn}; 
            padding: 8px 15px; border-radius: 15px; cursor: pointer; margin-top: 10px; 
            font-weight: bold; transition: 0.2s; flex-shrink: 0; align-self: center;
        }
        .clear-btn:hover { background: ${config.styles.btn}; color: white;}
    </style>

    <div class="game-container">
        <!-- ЛЕВАЯ ЧАСТЬ -->
        <div class="game-left">
            <div class="sentence-box">${wordsHtml}</div>
            <div class="tools-hint">Перетащите плашку на слово. Для удаления нажмите на слово.</div>
            
            <div class="drag-tools">
                <div class="drag-item" data-role="subject">Подлежащее <div class="demo-line line-sub"></div></div>
                <div class="drag-item" data-role="predicate">Сказуемое <div class="demo-line line-pred"></div></div>
                <div class="drag-item" data-role="object">Дополнение <div class="demo-line line-obj"></div></div>
                <div class="drag-item" data-role="attribute">Определение <div class="demo-line line-attr"></div></div>
                <div class="drag-item" data-role="adverbial">Обстоятельство <div class="demo-line line-adv"></div></div>
            </div>

            <div class="char-panel" id="char-panel">
                <div class="char-row"><div class="char-title">По цели:</div><div class="tags-group" data-category="celi"><button class="tag-btn" onclick="selectTag(this, 'повествовательное')">Повествовательное</button><button class="tag-btn" onclick="selectTag(this, 'вопросительное')">Вопросительное</button><button class="tag-btn" onclick="selectTag(this, 'побудительное')">Побудительное</button></div></div>
                <div class="char-row"><div class="char-title">По интонации:</div><div class="tags-group" data-category="int"><button class="tag-btn" onclick="selectTag(this, 'восклицательное')">Восклицательное</button><button class="tag-btn" onclick="selectTag(this, 'невосклицательное')">Невосклицательное</button></div></div>
                <div class="char-row"><div class="char-title">Основы:</div><div class="tags-group" data-category="osnov"><button class="tag-btn" onclick="selectTag(this, 'простое')">Простое</button><button class="tag-btn" onclick="selectTag(this, 'сложное')">Сложное</button></div></div>
                <div class="char-row"><div class="char-title">Второстеп. члены:</div><div class="tags-group" data-category="raspr"><button class="tag-btn" onclick="selectTag(this, 'распространённое')">Распространённое</button><button class="tag-btn" onclick="selectTag(this, 'нераспространённое')">Нераспространённое</button></div></div>
                <div class="char-row"><div class="char-title">Главные члены:</div><div class="tags-group" data-category="chlen"><button class="tag-btn" onclick="selectTag(this, 'двусоставное', true)">Двусоставное</button><button class="tag-btn" onclick="selectTag(this, 'односоставное', true)">Односоставное</button></div>
                    <div id="sub-indigo-wrap" style="display:none;"><div id="sub-odno"><div class="char-title">Тип односоставного:</div><div class="tags-group" data-category="sub"><button class="tag-btn" onclick="selectTag(this, 'назывное')">Назывное</button><button class="tag-btn" onclick="selectTag(this, 'определённо-личное')">Опред.-личное</button><button class="tag-btn" onclick="selectTag(this, 'неопределённо-личное')">Неопред.-личное</button><button class="tag-btn" onclick="selectTag(this, 'безличное')">Безличное</button></div></div></div>
                </div>
            </div>

            <div class="check-btn-wrap"><button class="check-btn" onclick="checkAll()">ПРОВЕРИТЬ ВСЁ</button></div>
        </div>

        <!-- ПРАВАЯ ЧАСТЬ (СХЕМА) -->
        <div class="game-right">
            <div class="canvas-header">Схема предложения</div>
            <div class="canvas-container">
                <canvas id="schemeCanvas"></canvas>
            </div>
            <button class="clear-btn" onclick="clearCanvas()">Очистить схему</button>
        </div>
    </div>

    <script>
        (function() {
            const CONFIG = ${safeConfigString};
            let selectedAnswers = { celi: '', int: '', osnov: '', raspr: '', chlen: '', sub: '' };

            window.selectTag = function(btn, value, isChlen = false) {
                const group = btn.closest('.tags-group');
                const cat = group.getAttribute('data-category');
                group.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected'); selectedAnswers[cat] = value;
                if (isChlen) {
                    const sub = document.getElementById('sub-odno');
                    const subWrap = document.getElementById('sub-indigo-wrap');
                    if (value === 'односоставное') { sub.classList.add('show'); subWrap.style.display = 'block'; }
                    else { sub.classList.remove('show'); subWrap.style.display = 'none'; selectedAnswers.sub = ''; sub.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected')); }
                }
            }

            // Drag & Drop
            let draggedItem = null, dragClone = null;
            document.querySelectorAll('#syntax-game-wrapper .drag-item').forEach(drag => {
                drag.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    draggedItem = drag;
                    dragClone = drag.cloneNode(true);
                    dragClone.classList.add('drag-clone');
                    dragClone.style.left = e.clientX + 'px';
                    dragClone.style.top = e.clientY + 'px';
                    document.getElementById('syntax-game-wrapper').appendChild(dragClone);
                    document.addEventListener('pointermove', onMove);
                    document.addEventListener('pointerup', onUp);
                });
            });

            function onMove(e) {
                if (!dragClone) return;
                dragClone.style.left = e.clientX + 'px';
                dragClone.style.top = e.clientY + 'px';
            }

            function onUp(e) {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                if (!dragClone) return;
                dragClone.style.display = 'none';
                
                const elem = document.elementFromPoint(e.clientX, e.clientY);
                if (elem && elem.classList.contains('word-drop')) {
                    const role = draggedItem.getAttribute('data-role');
                    elem.className = 'word-drop ans-' + role;
                    elem.setAttribute('data-user-role', role);
                }
                dragClone.remove(); dragClone = null; draggedItem = null;
            }

            document.querySelectorAll('#syntax-game-wrapper .word-drop').forEach(drop => {
                drop.addEventListener('click', () => { drop.className = 'word-drop'; drop.removeAttribute('data-user-role'); });
            });

            // ХОЛСТ РИСОВАНИЯ
            const canvas = document.getElementById('schemeCanvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            function resizeCanvas() {
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#333';
            }
            
            window.addEventListener('resize', resizeCanvas);
            setTimeout(resizeCanvas, 300);

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function startDraw(e) { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.cancelable) e.preventDefault(); }
            function draw(e) { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.cancelable) e.preventDefault(); }
            function stopDraw() { isDrawing = false; }

            canvas.addEventListener('pointerdown', startDraw);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', stopDraw);
            canvas.addEventListener('pointerout', stopDraw);

            window.clearCanvas = function() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

            // ПРОВЕРКА ОТВЕТОВ
            window.checkAll = function() {
                document.querySelectorAll('#syntax-game-wrapper .word-drop').forEach(drop => {
                    const idx = drop.getAttribute('data-index');
                    const corr = CONFIG.correct.roles[idx], usr = drop.getAttribute('data-user-role') || 'none';
                    if (corr !== 'none' && usr === corr) drop.classList.add('correct-line');
                    else if (usr !== 'none' || (corr !== 'none' && usr !== corr)) {
                        drop.className = 'word-drop'; drop.removeAttribute('data-user-role');
                        drop.classList.add('error-shake'); setTimeout(() => drop.classList.remove('error-shake'), 400);
                    }
                });

                document.querySelectorAll('#syntax-game-wrapper .student-pos').forEach(sel => {
                    const corr = CONFIG.correct.pos[sel.getAttribute('data-index')];
                    sel.classList.remove('correct', 'wrong');
                    if (sel.value === corr) { sel.classList.add('correct'); sel.disabled = true; }
                    else sel.classList.add('wrong');
                });

                Object.keys(CONFIG.chars).forEach(cat => {
                    if (cat === 'sub' && CONFIG.chars.chlen !== 'односоставное') return;
                    const group = document.querySelector('#syntax-game-wrapper .tags-group[data-category="'+cat+'"]');
                    if (!group) return;
                    const corr = CONFIG.chars[cat], usr = selectedAnswers[cat], selBtn = group.querySelector('.tag-btn.selected');
                    if (usr === corr) {
                        if (selBtn) { selBtn.classList.remove('selected'); selBtn.classList.add('correct-tag'); }
                        else { const cBtn = Array.from(group.querySelectorAll('.tag-btn')).find(b => b.innerText.toLowerCase() === corr.toLowerCase()); if(cBtn) cBtn.classList.add('correct-tag'); }
                    } else if (selBtn) {
                        selBtn.classList.remove('selected'); selBtn.classList.add('wrong-tag');
                        setTimeout(() => selBtn.classList.remove('wrong-tag'), 1000);
                    }
                });
            }
        })();
    <\/script>
</div>`;

            document.getElementById('code-output').value = studentHTML;
            const blob = new Blob([studentHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-frame').src = url;
        }

        window.onload = function() {
            parseWords();
        };
    </script>
</body>
</html>
