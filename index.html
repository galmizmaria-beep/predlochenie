
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор игры: Синтаксический разбор</title>
    <link href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Caveat:wght@600&family=Comfortaa:wght@700&family=El+Messiri:wght@700&family=Lobster&family=Marck+Script&family=Montserrat:wght@500;700&family=Nunito:wght@400;600;800&family=Pacifico&family=Playfair+Display:wght@700&family=Roboto:wght@400;500;700&family=Russo+One&display=swap&subset=cyrillic" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #241c30 0%, #0e0d16 100%);
            --panel-bg: rgba(28, 25, 41, 0.85);
            --accent-glow: #ff7a45;
            --accent-glow-dim: rgba(255, 122, 69, 0.15);
            --accent-purple: #a29bfe;
            --text-light: #ececf1;
            --text-muted: #9da2b4;
            --input-bg: #1c1929;
            --border-color: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            margin: 0; 
            padding: 8px; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            color: var(--text-light); 
            box-sizing: border-box;
        }

        /* Тонкий кастомный скроллбар для компактности */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-glow-dim);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-glow);
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 8px; 
            color: white;
        }
        .header h1 { 
            font-family: 'Comfortaa', cursive; 
            font-size: 1.25rem; 
            margin: 0 0 2px 0; 
            text-shadow: 0 0 10px rgba(255, 122, 69, 0.3);
            color: var(--accent-glow);
        }
        .header p {
            margin: 0;
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        /* Измененные пропорции: Окно предпросмотра (справа) БОЛЬШЕ, чем панель инструментов (слева) */
        .main-layout { 
            display: grid; 
            grid-template-columns: 0.9fr 1.1fr; 
            gap: 10px; 
            max-width: 1400px; 
            margin: 0 auto; 
            align-items: start; 
        }
        
        @media (max-width: 950px) { 
            .main-layout { grid-template-columns: 1fr; } 
        }

        .panel { 
            background: var(--panel-bg); 
            border-radius: 10px; 
            padding: 10px 14px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.05); 
            backdrop-filter: blur(12px);
            margin-bottom: 8px; 
            border: 1px solid var(--border-color);
        }
        
        h2 { 
            color: var(--text-light); 
            margin-top: 0; 
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1); 
            padding-bottom: 4px; 
            font-size: 0.8rem;
            font-family: 'Comfortaa', sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--accent-glow);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        
        .step { 
            border-left: 2px solid var(--accent-glow); 
            padding-left: 8px; 
            margin-bottom: 8px; 
        }
        
        label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            display: block;
            margin-bottom: 1px;
        }
        
        textarea, select, input { 
            width: 100%; 
            padding: 5px 8px; 
            border: 1px solid var(--border-color); 
            border-radius: 5px; 
            font-family: inherit; 
            font-size: 0.75rem; 
            box-sizing: border-box; 
            margin-top: 1px; 
            background: var(--input-bg);
            color: var(--text-light);
            transition: all 0.2s;
        }
        textarea:focus, select:focus, input:focus {
            outline: none;
            border-color: var(--accent-glow);
            box-shadow: 0 0 6px var(--accent-glow-dim);
        }
        
        input[type="color"] { 
            height: 26px; 
            padding: 1px; 
            cursor: pointer; 
            border-radius: 5px;
            background: transparent;
        }
        
        button { 
            background: linear-gradient(135deg, var(--accent-glow), #d45034); 
            color: white; 
            border: none; 
            padding: 5px 12px; 
            border-radius: 5px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-top: 4px; 
            box-shadow: 0 4px 8px var(--accent-glow-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        button:hover { 
            transform: translateY(-1px); 
            box-shadow: 0 5px 12px rgba(255, 122, 69, 0.35); 
        }
        
        .btn-green { 
            background: linear-gradient(135deg, #10b981, #059669); 
            width: 100%; 
            padding: 8px; 
            font-size: 0.8rem; 
            margin-top: 6px;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(16, 185, 129, 0.2);
        }
        .btn-green:hover {
            box-shadow: 0 5px 12px rgba(16, 185, 129, 0.35);
        }
        
        #word-mapper { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 5px; 
            margin-top: 6px; 
        }
        .word-setup-card { 
            background: #151322; 
            padding: 5px; 
            border-radius: 6px; 
            border: 1px solid var(--border-color); 
            text-align: center;
        }
        .word-setup-card strong { 
            display: block; 
            margin-bottom: 2px; 
            font-size: 0.8rem; 
            color: var(--accent-glow); 
            word-break: break-all;
        }
        .word-setup-card select {
            font-size: 0.7rem;
            padding: 2px;
        }
        
        .settings-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
            gap: 5px; 
        }
        
        /* Зона превью */
        .preview-sticky { 
            position: sticky; 
            top: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        .preview-wrapper { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            border: 2px solid var(--border-color); 
            border-radius: 10px; 
            background: white; 
            overflow: hidden; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.5); 
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; display: block;}
        
        #code-output { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }
        .copy-btn { 
            background: linear-gradient(135deg, #3b82f6, #1d4ed8); 
            font-size: 0.8rem; 
            padding: 8px; 
            width: 100%; 
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(59, 130, 246, 0.2);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover { 
            transform: translateY(-1px);
            box-shadow: 0 5px 12px rgba(59, 130, 246, 0.35); 
        }

        .preview-label { 
            position: absolute; 
            top: 5px; 
            left: 5px; 
            background: rgba(14, 13, 22, 0.85); 
            color: var(--accent-glow); 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.6rem; 
            pointer-events: none; 
            z-index: 100; 
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid var(--accent-glow-dim);
        }
        .desc-text {
            font-size: 0.65rem; 
            color: var(--text-muted); 
            margin: 0; 
            line-height: 1.2;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Конструктор упражнения</h1>
        <p>Синтаксический разбор предложения</p>
    </div>

    <div class="main-layout">
        
        <!-- ЛЕВАЯ КОЛОНКА -->
        <div class="left-panel">
            <div class="panel">
                <h2>Настройки дизайна</h2>
                <div class="settings-grid">
                    <div><label>Цвет фона:</label><input type="color" id="set-bg" value="#f4f9f9" onchange="generateGame()"></div>
                    <div><label>Цвет кнопок:</label><input type="color" id="set-btn" value="#5c8a8a" onchange="generateGame()"></div>
                    <div><label>Цвет выделения:</label><input type="color" id="set-active" value="#2196F3" onchange="generateGame()"></div>
                    <div><label>Кнопка "Проверить":</label><input type="color" id="set-btn-check" value="#e67e22" onchange="generateGame()"></div>
                    <div><label>Свечение:</label><input type="color" id="set-glow" value="#a2d9ce" onchange="generateGame()"></div>
                    <div><label>Шрифт текста:</label>
                        <select id="set-font" onchange="generateGame()">
                            <option value="'Nunito', sans-serif">Nunito (Аккуратный)</option>
                            <option value="'Montserrat', sans-serif">Montserrat (Строгий)</option>
                            <option value="'Comfortaa', cursive">Comfortaa (Округлый)</option>
                            <option value="'Caveat', cursive">Caveat (Рукописный)</option>
                            <option value="'Russo One', sans-serif">Russo One (Жирный)</option>
                            <option value="'Pacifico', cursive">Pacifico (Праздничный)</option>
                            <option value="'Lobster', cursive">Lobster (Ретро-стиль)</option>
                            <option value="'Marck Script', cursive">Marck Script (Каллиграфия)</option>
                            <option value="'Playfair Display', serif">Playfair Display (Классика)</option>
                            <option value="'El Messiri', sans-serif">El Messiri (Восточный)</option>
                            <option value="'Bad Script', cursive">Bad Script (Небрежный)</option>
                        </select>
                    </div>
                    <div><label>Размер шрифта:</label>
                        <select id="set-size" onchange="generateGame()">
                            <option value="14px">Маленький (14px)</option>
                            <option value="16px">Средний (16px)</option>
                            <option value="18px" selected>Крупный (18px)</option>
                            <option value="20px">Очень крупный (20px)</option>
                            <option value="22px">Размер 22px</option>
                            <option value="24px">Размер 24px</option>
                            <option value="28px">Огромный (28px)</option>
                            <option value="32px">Максимальный (32px)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>Ввод предложения</h2>
                <div class="step">
                    <label>Введите текст предложения:</label>
                    <textarea id="sentence-input" rows="1">Наступила золотая осень.</textarea>
                    <button onclick="parseWords()">Разбить на токены</button>
                </div>

                <div class="step" id="step-words" style="display:none;">
                    <label>Роли и части речи для каждого слова:</label>
                    <div id="word-mapper"></div>
                </div>
            </div>

            <div class="panel">
                <h2>Характеристики предложения</h2>
                <div class="settings-grid">
                    <div><label>По цели:</label><select id="ans-celi" onchange="generateGame()"><option value="повествовательное">Повествовательное</option><option value="вопросительное">Вопросительное</option><option value="побудительное">Побудительное</option></select></div>
                    <div><label>По интонации:</label><select id="ans-int" onchange="generateGame()"><option value="невосклицательное">Невосклицательное</option><option value="восклицательное">Восклицательное</option></select></div>
                    <div><label>Грамм. основы:</label><select id="ans-osnov" onchange="generateGame()"><option value="простое">Простое</option><option value="сложное">Сложное</option></select></div>
                    <div><label>Второстеп. члены:</label><select id="ans-raspr" onchange="generateGame()"><option value="распространённое">Распространённое</option><option value="нераспространённое">Нераспространённое</option></select></div>
                    <div><label>Главные члены:</label><select id="ans-chlen" onchange="toggleSubOdno(); generateGame()"><option value="двусоставное">Двусоставное</option><option value="односоставное">Односоставное</option></select></div>
                    <div id="sub-indigo-wrap" style="display:none;"><label>Тип односост.:</label><select id="ans-sub" onchange="generateGame()"><option value="назывное">Назывное</option><option value="определённо-личное">Опред.-личное</option><option value="неопределённо-личное">Неопред.-личное</option><option value="безличное">Безличное</option></select></div>
                </div>
                <button class="btn-green" onclick="generateGame()">Обновить предпросмотр</button>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА -->
        <div class="right-panel">
            <div class="preview-sticky">
                <div class="preview-wrapper">
                    <div class="preview-label">Предпросмотр игры</div>
                    <iframe id="preview-frame"></iframe>
                </div>
                
                <p class="desc-text">Вставьте скопированный код в Genially через меню <b>Insert -> Others -> HTML code</b> и растяните.</p>
                
                <textarea id="code-output" readonly></textarea>
                <button id="copy-btn" class="copy-btn" onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
            </div>
        </div>

    </div>

    <script>
        let wordsArray = [];
        const partsOfSpeech = ["существительное", "прилагательное", "числительное", "местоимение", "глагол", "причастие", "деепричастие", "наречие", "союз", "предлог", "частица", "междометие", "нет"];

        // Конвертер hex в rgba для динамического выделения
        function hexToRgbA(hex, alpha) {
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){
                    c= [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c= '0x' + c.join('');
                return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
            }
            return 'rgba(33, 150, 243, ' + alpha + ')';
        }

        function parseWords() {
            let text = document.getElementById('sentence-input').value.trim();
            wordsArray = text.split(/\s+/);
            const mapper = document.getElementById('word-mapper');
            mapper.innerHTML = '';
            
            let posOptions = partsOfSpeech.map(p => `<option value="${p}">${p}</option>`).join('');

            wordsArray.forEach((word, index) => {
                mapper.innerHTML += `
                    <div class="word-setup-card">
                        <strong>${word}</strong>
                        <select id="role-${index}" onchange="generateGame()" style="margin-top:2px; margin-bottom:5px; padding:3px; font-size: 0.75rem;">
                            <option value="none">Нет (служебная)</option>
                            <option value="subject">Подлежащее</option>
                            <option value="predicate">Сказуемое</option>
                            <option value="object">Дополнение</option>
                            <option value="attribute">Определение</option>
                            <option value="adverbial">Обстоятельство</option>
                        </select>
                        <select id="pos-${index}" onchange="generateGame()" style="margin-top:2px; padding:3px; font-size: 0.75rem;">
                            ${posOptions}
                        </select>
                    </div>
                `;
            });
            document.getElementById('step-words').style.display = 'block';
            
            if (text === "Наступила золотая осень.") {
                if (document.getElementById('role-0')) document.getElementById('role-0').value = "predicate";
                if (document.getElementById('pos-0')) document.getElementById('pos-0').value = "глагол";
                if (document.getElementById('role-1')) document.getElementById('role-1').value = "attribute";
                if (document.getElementById('pos-1')) document.getElementById('pos-1').value = "прилагательное";
                if (document.getElementById('role-2')) document.getElementById('role-2').value = "subject";
                if (document.getElementById('pos-2')) document.getElementById('pos-2').value = "существительное";
            }
            generateGame();
        }

        function toggleSubOdno() {
            const val = document.getElementById('ans-chlen').value;
            document.getElementById('sub-indigo-wrap').style.display = val === 'односоставное' ? 'block' : 'none';
        }

        function copyCode() {
            const code = document.getElementById('code-output');
            code.select();
            document.execCommand('copy');
            
            const btn = document.getElementById('copy-btn');
            const originalText = btn.innerText;
            btn.innerText = '✅ КОД УСПЕШНО СКОПИРОВАН!';
            btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = 'linear-gradient(135deg, #3b82f6, #1d4ed8)';
            }, 3000);
        }

        function generateGame() {
            if (wordsArray.length === 0) return;

            const correctData = { roles: {}, pos: {} };
            wordsArray.forEach((_, index) => {
                correctData.roles[index] = document.getElementById(`role-${index}`).value;
                correctData.pos[index] = document.getElementById(`pos-${index}`).value;
            });

            const activeColor = document.getElementById('set-active').value;
            const activeColorLight = hexToRgbA(activeColor, 0.15);

            const config = {
                correct: correctData,
                chars: {
                    celi: document.getElementById('ans-celi').value,
                    int: document.getElementById('ans-int').value,
                    osnov: document.getElementById('ans-osnov').value,
                    raspr: document.getElementById('ans-raspr').value,
                    chlen: document.getElementById('ans-chlen').value,
                    sub: document.getElementById('ans-chlen').value === 'односоставное' ? document.getElementById('ans-sub').value : ''
                },
                styles: {
                    bg: document.getElementById('set-bg').value,
                    btn: document.getElementById('set-btn').value,
                    btnCheck: document.getElementById('set-btn-check').value,
                    glow: document.getElementById('set-glow').value,
                    font: document.getElementById('set-font').value,
                    size: document.getElementById('set-size').value,
                    active: activeColor,
                    activeLight: activeColorLight
                }
            };

            const posOptionsHTML = `<option value="none">Часть речи...</option>` + partsOfSpeech.map(p => `<option value="${p}">${p}</option>`).join('');
            const wordsHtml = wordsArray.map((w, i) => `
                <div class="word-col">
                    <select class="student-pos" data-index="${i}">${posOptionsHTML}</select>
                    <span class="word-drop" data-index="${i}">${w}</span>
                </div>
            `).join('');

            const safeConfigString = JSON.stringify(config);

            // МОДЕРНИЗИРОВАННЫЙ И ИЗОЛИРОВАННЫЙ CSS ДЛЯ GENIALLY С КРАСИВЫМИ ЛИНИЯМИ (ОБСТОЯТЕЛЬСТВО И ОПРЕДЕЛЕНИЕ)
            const cssStyles = [
                '@import url("https://fonts.googleapis.com/css2?family=Bad+Script&family=Caveat:wght@600&family=Comfortaa:wght@700&family=El+Messiri:wght@700&family=Lobster&family=Marck+Script&family=Montserrat:wght@500;700&family=Nunito:wght@400;600;800&family=Pacifico&family=Playfair+Display:wght@700&family=Roboto:wght@400;500;700&family=Russo+One&display=swap&subset=cyrillic");',
                '#syntax-game-wrapper, #syntax-game-wrapper * { box-sizing: border-box !important; -webkit-tap-highlight-color: transparent; }',
                '#syntax-game-wrapper { position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; background: ' + config.styles.bg + ' !important; display: flex !important; align-items: center !important; justify-content: center !important; }',
                '#scaler { width: 1280px !important; height: 720px !important; transform-origin: center center !important; flex-shrink: 0 !important; position: relative !important; }',
                '#syntax-game-wrapper .game-container { width: 1280px !important; height: 720px !important; font-family: ' + config.styles.font + ', "Nunito", sans-serif !important; color: #333 !important; overflow: hidden !important; display: flex !important; background: ' + config.styles.bg + ' !important; margin: 0 !important; padding: 0 !important;}',
                '#syntax-game-wrapper .game-left { width: 58% !important; flex: none !important; padding: 25px !important; display: flex !important; flex-direction: column !important; border-right: 3px dashed rgba(0,0,0,0.1) !important; height: 100% !important; overflow: hidden !important;}',
                '#syntax-game-wrapper .game-right { width: 42% !important; flex: none !important; padding: 25px !important; display: flex !important; flex-direction: column !important; background: rgba(255,255,255,0.45) !important; height: 100% !important; }',
                '#syntax-game-wrapper .sentence-box { background: white !important; padding: 20px !important; border-radius: 15px !important; text-align: center !important; margin-bottom: 15px !important; display: flex !important; flex-wrap: wrap !important; justify-content: center !important; gap: 20px 15px !important; align-items: flex-end !important; font-size: ' + config.styles.size + ' !important; box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important; border: 1px solid #eee !important; flex-shrink: 0 !important; min-height: 110px !important;}',
                '#syntax-game-wrapper .word-col { display: flex !important; flex-direction: column !important; align-items: center !important; gap: 8px !important; min-height: 85px !important; justify-content: flex-end !important; }',
                '#syntax-game-wrapper .student-pos { font-family: inherit !important; font-size: 0.75em !important; padding: 6px !important; border: 2px solid #ccc !important; border-radius: 6px !important; background: white !important; width: 130px !important; cursor: pointer !important; text-align: center !important; display: block !important; height: auto !important;}',
                '#syntax-game-wrapper .student-pos.correct { background: #e8f5e9 !important; border-color: #4CAF50 !important; color: #2e7d32 !important; }',
                '#syntax-game-wrapper .student-pos.wrong { background: #ffebee !important; border-color: #f44336 !important; color: #c62828 !important; }',
                '#syntax-game-wrapper .word-drop { font-family: inherit !important; padding: 4px 8px !important; border-radius: 6px !important; border: 2px solid transparent !important; cursor: pointer !important; font-size: 1.35em !important; position: relative !important; user-select: none !important; display: inline-block !important; font-weight: 700 !important; color: #222 !important; line-height: 1.2 !important;}',
                '#syntax-game-wrapper .ans-subject { border-bottom: 4px solid #333 !important; border-radius: 0 !important; }',
                '#syntax-game-wrapper .ans-predicate { border-bottom: 7px double #333 !important; border-radius: 0 !important; }',

                '#syntax-game-wrapper .char-panel { background: white !important; border-radius: 15px !important; padding: 15px !important; border: 1px solid #eee !important; margin-bottom: 15px !important; flex-grow: 1 !important; overflow-y: auto !important; display: flex !important; flex-direction: column !important; gap: 12px !important; }',

                '#syntax-game-wrapper .check-btn-wrap { display: flex !important; justify-content: center !important; flex-shrink: 0 !important; }',
                '#syntax-game-wrapper .check-btn { background: ' + config.styles.btnCheck + ' !important; color: white !important; border: none !important; padding: 14px 40px !important; border-radius: 30px !important; font-size: 1.25em !important; font-weight: 800 !important; cursor: pointer !important; transition: all 0.2s !important; box-shadow: 0 6px 20px rgba(0,0,0,0.15) !important; width: 100% !important; max-width: 360px !important; font-family: inherit !important; display: block !important;}',
                '#syntax-game-wrapper .check-btn:hover { transform: translateY(-2px) !important; box-shadow: 0 8px 25px rgba(0,0,0,0.2) !important; }',
                '#syntax-game-wrapper .check-btn:active { transform: translateY(0) !important; }',
                '#syntax-game-wrapper .canvas-header { font-weight: 800 !important; color: ' + config.styles.btn + ' !important; font-size: 1.4em !important; margin-bottom: 12px !important; text-align: center !important; flex-shrink: 0 !important; font-family: inherit !important;}',
                '#syntax-game-wrapper .canvas-container { flex-grow: 1 !important; border: 4px dashed #b0bec5 !important; border-radius: 15px !important; background: white !important; position: relative !important; overflow: hidden !important; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05) !important; }',

                '#syntax-game-wrapper .clear-btn { background: #fff !important; border: 2px solid ' + config.styles.btn + ' !important; color: ' + config.styles.btn + ' !important; padding: 10px 22px !important; border-radius: 20px !important; cursor: pointer !important; margin-top: 15px !important; font-weight: 800 !important; transition: all 0.2s !important; flex-shrink: 0 !important; align-self: center !important; font-size: 0.9em !important; font-family: inherit !important; display: inline-block !important;}',
                '#syntax-game-wrapper .clear-btn:hover { background: ' + config.styles.btn + ' !important; color: white !important;}'
            ].join('\n');

            const studentHTML = `<div id="syntax-game-wrapper" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: ${config.styles.bg}; box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
    
    <div id="scaler">
    <div class="game-container">
        <div class="game-left">
            <div class="sentence-box">${wordsHtml}</div>
            <div class="tools-hint">Перетащите плашку на слово. Для удаления нажмите на слово.</div>
            
            <div class="drag-tools">
                <div class="drag-item" data-role="subject">Подлежащее <div class="demo-line line-sub"></div></div>
                <div class="drag-item" data-role="predicate">Сказуемое <div class="demo-line line-pred"></div></div>
                <div class="drag-item" data-role="object">Дополнение <div class="demo-line line-obj"></div></div>
                <div class="drag-item" data-role="attribute">Определение <div class="demo-line line-attr"></div></div>
                <div class="drag-item" data-role="adverbial">Обстоятельство <div class="demo-line line-adv"></div></div>
            </div>

            <div class="char-panel" id="char-panel">
                <div class="char-row"><div class="char-title">По цели:</div><div class="tags-group" data-category="celi"><button class="tag-btn" onclick="selectTag(this, 'повествовательное')">Повествовательное</button><button class="tag-btn" onclick="selectTag(this, 'вопросительное')">Вопросительное</button><button class="tag-btn" onclick="selectTag(this, 'побудительное')">Побудительное</button></div></div>
                <div class="char-row"><div class="char-title">По интонации:</div><div class="tags-group" data-category="int"><button class="tag-btn" onclick="selectTag(this, 'восклицательное')">Восклицательное</button><button class="tag-btn" onclick="selectTag(this, 'невосклицательное')">Невосклицательное</button></div></div>
                <div class="char-row"><div class="char-title">Основы:</div><div class="tags-group" data-category="osnov"><button class="tag-btn" onclick="selectTag(this, 'простое')">Простое</button><button class="tag-btn" onclick="selectTag(this, 'сложное')">Сложное</button></div></div>
                <div class="char-row"><div class="char-title">Второстеп. члены:</div><div class="tags-group" data-category="raspr"><button class="tag-btn" onclick="selectTag(this, 'распространённое')">Распространённое</button><button class="tag-btn" onclick="selectTag(this, 'нераспространённое')">Нераспространённое</button></div></div>
                <div class="char-row"><div class="char-title">Главные члены:</div><div class="tags-group" data-category="chlen"><button class="tag-btn" onclick="selectTag(this, 'двусоставное', true)">Двусоставное</button><button class="tag-btn" onclick="selectTag(this, 'односоставное', true)">Односоставное</button></div>
                    <div id="sub-indigo-wrap" style="display:none;"><div id="sub-odno"><div class="char-title">Тип односоставного:</div><div class="tags-group" data-category="sub"><button class="tag-btn" onclick="selectTag(this, 'назывное')">Назывное</button><button class="tag-btn" onclick="selectTag(this, 'определённо-личное')">Опред.-личное</button><button class="tag-btn" onclick="selectTag(this, 'неопределённо-личное')">Неопред.-личное</button><button class="tag-btn" onclick="selectTag(this, 'безличное')">Безличное</button></div></div></div>
                </div>
            </div>

            <div class="check-btn-wrap"><button class="check-btn" onclick="checkAll()">ПРОВЕРИТЬ ВСЁ</button></div>
        </div>

        <div class="game-right">
            <div class="canvas-header">Схема предложения</div>
            <div class="canvas-container">
                <canvas id="schemeCanvas"></canvas>
            </div>
            <button class="clear-btn" onclick="clearCanvas()">Очистить схему</button>
        </div>
    </div>
    </div>

    <script>
        (function() {
            const styleNode = document.createElement('style');
            styleNode.innerHTML = ${JSON.stringify(cssStyles)};
            document.head.appendChild(styleNode);

            const CONFIG = ${safeConfigString};
            let selectedAnswers = { celi: '', int: '', osnov: '', raspr: '', chlen: '', sub: '' };
            const wrapper = document.getElementById('syntax-game-wrapper');
            const scaler = document.getElementById('scaler');

            // УЛУЧШЕННОЕ АВТО-МАСШТАБИРОВАНИЕ ПОД GENIALLY
            function fitScale() {
                const w = wrapper.clientWidth || window.innerWidth || 1280;
                const h = wrapper.clientHeight || window.innerHeight || 720;
                const scale = Math.min(w / 1280, h / 720);
                scaler.style.transform = 'scale(' + scale + ')';
            }

            // Постоянный мониторинг изменений размера фрейма Genially
            if (typeof ResizeObserver !== 'undefined') {
                const ro = new ResizeObserver(() => {
                    fitScale();
                    setTimeout(resizeCanvas, 100);
                });
                ro.observe(wrapper);
            }

            window.addEventListener('resize', fitScale);
            
            // Интервальный запуск на случай задержки загрузки Genially
            let initCounter = 0;
            const initInterval = setInterval(() => {
                fitScale();
                initCounter++;
                if (initCounter > 10) clearInterval(initInterval);
            }, 300);

            window.selectTag = function(btn, value, isChlen = false) {
                const group = btn.closest('.tags-group');
                const cat = group.getAttribute('data-category');
                group.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected'); selectedAnswers[cat] = value;
                if (isChlen) {
                    const sub = document.getElementById('sub-odno');
                    const subWrap = document.getElementById('sub-indigo-wrap');
                    if (value === 'односоставное') { sub.classList.add('show'); subWrap.style.display = 'block'; }
                    else { sub.classList.remove('show'); subWrap.style.display = 'none'; selectedAnswers.sub = ''; sub.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected')); }
                }
                fitScale();
            }

            // Drag & Drop (С поддержкой Touch-событий в фреймах)
            let draggedItem = null, dragClone = null;
            document.querySelectorAll('#syntax-game-wrapper .drag-item').forEach(drag => {
                drag.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    draggedItem = drag;
                    dragClone = drag.cloneNode(true);
                    dragClone.classList.add('drag-clone');
                    dragClone.style.left = e.clientX + 'px';
                    dragClone.style.top = e.clientY + 'px';
                    wrapper.appendChild(dragClone);
                    document.addEventListener('pointermove', onMove);
                    document.addEventListener('pointerup', onUp);
                });
            });
            function onMove(e) { if (!dragClone) return; dragClone.style.left = e.clientX + 'px'; dragClone.style.top = e.clientY + 'px'; }
            function onUp(e) {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                if (!dragClone) return;
                dragClone.style.display = 'none';
                const elem = document.elementFromPoint(e.clientX, e.clientY);
                if (elem && elem.classList.contains('word-drop')) {
                    const role = draggedItem.getAttribute('data-role');
                    elem.className = 'word-drop ans-' + role;
                    elem.setAttribute('data-user-role', role);
                }
                dragClone.remove(); dragClone = null; draggedItem = null;
            }

            document.querySelectorAll('#syntax-game-wrapper .word-drop').forEach(drop => {
                drop.addEventListener('click', () => { drop.className = 'word-drop'; drop.removeAttribute('data-user-role'); });
            });

            // ХОЛСТ РИСОВАНИЯ
            const canvas = document.getElementById('schemeCanvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            function resizeCanvas() {
                const rect = canvas.getBoundingClientRect();
                const scale = Math.min(wrapper.clientWidth / 1280, wrapper.clientHeight / 720) || 1;
                canvas.width = rect.width / scale;
                canvas.height = rect.height / scale;
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#333';
            }
            setTimeout(resizeCanvas, 500);
            window.addEventListener('resize', () => setTimeout(resizeCanvas, 100));

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
            }
            function startDraw(e) { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.cancelable) e.preventDefault(); }
            function draw(e) { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.cancelable) e.preventDefault(); }
            function stopDraw() { isDrawing = false; }
            canvas.addEventListener('pointerdown', startDraw);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', stopDraw);
            canvas.addEventListener('pointerout', stopDraw);
            window.clearCanvas = function() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

            // ПРОВЕРКА ОТВЕТОВ
            window.checkAll = function() {
                document.querySelectorAll('#syntax-game-wrapper .word-drop').forEach(drop => {
                    const idx = drop.getAttribute('data-index');
                    const corr = CONFIG.correct.roles[idx], usr = drop.getAttribute('data-user-role') || 'none';
                    if (corr !== 'none' && usr === corr) drop.classList.add('correct-line');
                    else if (usr !== 'none' || (corr !== 'none' && usr !== corr)) {
                        drop.className = 'word-drop'; drop.removeAttribute('data-user-role');
                        drop.classList.add('error-shake'); setTimeout(() => drop.classList.remove('error-shake'), 400);
                    }
                });
                
                document.querySelectorAll('#syntax-game-wrapper .student-pos').forEach(sel => {
                    const corr = CONFIG.correct.pos[sel.getAttribute('data-index')];
                    sel.classList.remove('correct', 'wrong');
                    if (sel.value === corr) { sel.classList.add('correct'); sel.disabled = true; }
                    else sel.classList.add('wrong');
                });
                
                Object.keys(CONFIG.chars).forEach(cat => {
                    if (cat === 'sub' && CONFIG.chars.chlen !== 'односоставное') return;
                    const group = document.querySelector('#syntax-game-wrapper .tags-group[data-category="'+cat+'"]');
                    if (!group) return;
                    const corr = CONFIG.chars[cat], usr = selectedAnswers[cat], selBtn = group.querySelector('.tag-btn.selected');
                    if (usr === corr) {
                        if (selBtn) { selBtn.classList.remove('selected'); selBtn.classList.add('correct-tag'); }
                        else { const cBtn = Array.from(group.querySelectorAll('.tag-btn')).find(b => b.innerText.toLowerCase() === corr.toLowerCase()); if(cBtn) cBtn.classList.add('correct-tag'); }
                    } else if (selBtn) {
                        selBtn.classList.remove('selected'); selBtn.classList.add('wrong-tag');
                        setTimeout(() => selBtn.classList.remove('wrong-tag'), 1000);
                    }
                });
            }
        })();
    <\/script>
</div>`;

            document.getElementById('code-output').value = studentHTML;
            const blob = new Blob([studentHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-frame').src = url;
        }

        window.onload = function() {
            parseWords();
        };
    </script>
