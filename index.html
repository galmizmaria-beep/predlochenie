<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор: Синтаксический разбор предложения</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #658c98;
            --bg-clouds: #e9f4f7;
            --paper-bg: #fdf5eb;
            --accent-red: #d46b54;
            --text-dark: #4a3b52;
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-clouds);
            color: var(--text-dark);
        }

        .header {
            background-color: var(--bg-top);
            padding: 30px 20px 60px 20px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-family: 'Caveat', cursive;
            color: white;
            font-size: 3rem;
            margin: 0;
        }

        .clouds-divider {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 40px;
            background-image: radial-gradient(circle at 20px 0, transparent 20px, var(--bg-clouds) 21px);
            background-size: 40px 100%;
            background-repeat: repeat-x;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        textarea, input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        button {
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #b85a45; transform: translateY(-2px); }

        .workspace { display: flex; gap: 20px; }
        .editor-col, .preview-col { flex: 1; }

        iframe {
            width: 100%;
            height: 700px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            background: white;
        }

        #code-output {
            background: #2b2b2b;
            color: #a9b7c6;
            font-family: monospace;
            height: 150px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Синтаксический разбор предложения</h1>
        <div class="clouds-divider"></div>
    </div>

    <div class="container">
        <div class="panel">
            <h2 style="margin-top:0;">Настройка задания</h2>
            <p>Введите предложение для разбора:</p>
            <textarea id="sentence-input" rows="2">Осенью птицы улетают в теплые края.</textarea>
            <button onclick="generateApp()">Сгенерировать код и предпросмотр</button>
        </div>

        <div class="workspace">
            <div class="editor-col panel">
                <h2 style="margin-top:0;">Код для Genially</h2>
                <p>Скопируйте этот код (Insert -> Others -> HTML code)</p>
                <textarea id="code-output" readonly></textarea>
                <button onclick="copyCode()">Скопировать код</button>
            </div>

            <div class="preview-col panel">
                <h2 style="margin-top:0;">Предпросмотр</h2>
                <iframe id="preview-frame"></iframe>
            </div>
        </div>
    </div>

    <script>
        function copyCode() {
            const code = document.getElementById('code-output');
            code.select();
            document.execCommand('copy');
            alert('Код скопирован!');
        }

        function generateApp() {
            const text = document.getElementById('sentence-input').value.trim();
            // Оборачиваем слова в span для перетаскивания
            const wordsHtml = text.split(/\s+/).map(w => `<span class="word-drop" ondrop="dropLine(event)" ondragover="allowDrop(event)">${w}</span>`).join(' ');

            const studentHTML = `
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
    :root {
        --accent: #d46b54;
        --bg: #fdf5eb;
        --dark: #4a3b52;
    }
    body {
        margin: 0; padding: 20px; font-family: 'Nunito', sans-serif;
        background: transparent; color: var(--dark);
        width: 100vw; height: 100vh; box-sizing: border-box; overflow-y: auto; overflow-x: hidden;
    }
    
    /* Блок с предложением */
    .sentence-box {
        background: white; padding: 30px; border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;
        font-size: 26px; line-height: 2.5; margin-bottom: 20px;
    }
    
    /* Слова и линии */
    .word-drop {
        padding: 5px; margin: 0 5px; border-radius: 5px;
        transition: background 0.2s; cursor: pointer; display: inline-block;
    }
    .word-drop.drag-over { background: #ffe4de; }
    
    .line-subject { border-bottom: 3px solid var(--accent); }
    .line-predicate { border-bottom: 5px double var(--accent); }
    .line-object { border-bottom: 3px dashed var(--accent); }
    .line-attribute { text-decoration: underline wavy var(--accent); text-underline-offset: 6px; }
    .line-adverbial { 
        background-image: linear-gradient(to right, var(--accent) 50%, transparent 50%);
        background-size: 10px 3px; background-position: bottom; background-repeat: repeat-x; padding-bottom: 4px;
    }

    /* Раскрывающаяся плашка */
    .accordion-btn {
        background: var(--accent); color: white; border: none;
        width: 100%; padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold;
        cursor: pointer; box-shadow: 0 4px 10px rgba(212,107,84,0.3); text-align: center;
        font-family: inherit; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
    }
    .accordion-btn::after { content: '▼'; font-size: 14px; transition: 0.3s;}
    .accordion-btn.active::after { transform: rotate(180deg); }
    
    .accordion-content {
        background: white; border-radius: 15px; padding: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; margin-bottom: 20px;
    }
    .accordion-content.show { display: block; }

    /* Характеристики */
    .char-row { margin-bottom: 15px; }
    .char-title { font-weight: 600; margin-bottom: 8px; color: #888; font-size: 14px; }
    .tags-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn {
        background: var(--bg); border: 2px solid transparent; padding: 8px 15px;
        border-radius: 20px; cursor: pointer; font-family: inherit; font-size: 15px; color: var(--dark);
    }
    .tag-btn.selected { background: #ffe4de; border-color: var(--accent); color: var(--accent); font-weight: bold;}
    
    #sub-odno { display: none; margin-top: 10px; border-left: 3px solid var(--accent); padding-left: 10px; }
    #sub-odno.show { display: flex; }

    /* Инструменты перетаскивания (Члены предложения) */
    .drag-tools {
        display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px;
    }
    .drag-item {
        background: white; padding: 10px 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        cursor: grab; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 14px;
        user-select: none;
    }
    .drag-item:active { cursor: grabbing; }
    
    .demo-line { width: 40px; height: 10px; }

    /* Рисовалка */
    .canvas-container {
        background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    canvas {
        border: 2px dashed #ccc; border-radius: 10px; background: #fafafa; cursor: crosshair; touch-action: none; width: 100%; height: 150px;
    }
    .clear-btn { background: #ccc; border: none; padding: 5px 15px; border-radius: 10px; cursor: pointer; margin-top: 10px; font-family: inherit;}

</style>
</head>
<body>

    <!-- Предложение -->
    <div class="sentence-box">${wordsHtml}</div>

    <!-- Инструменты для разбора -->
    <div class="drag-tools">
        <div class="drag-item" draggable="true" ondragstart="dragStart(event, 'line-subject')">Подлежащее <div class="demo-line" style="border-bottom: 3px solid black;"></div></div>
        <div class="drag-item" draggable="true" ondragstart="dragStart(event, 'line-predicate')">Сказуемое <div class="demo-line" style="border-bottom: 5px double black;"></div></div>
        <div class="drag-item" draggable="true" ondragstart="dragStart(event, 'line-object')">Дополнение <div class="demo-line" style="border-bottom: 3px dashed black;"></div></div>
        <div class="drag-item" draggable="true" ondragstart="dragStart(event, 'line-attribute')">Определение <div class="demo-line" style="text-decoration: underline wavy black; text-underline-offset: -5px;"></div></div>
        <div class="drag-item" draggable="true" ondragstart="dragStart(event, 'line-adverbial')">Обстоятельство <div class="demo-line" style="background-image: linear-gradient(to right, black 50%, transparent 50%); background-size: 10px 3px; background-position: bottom; background-repeat: repeat-x;"></div></div>
        <div class="drag-item" draggable="true" ondragstart="dragStart(event, 'clear')" style="color: #999;">Очистить ❌</div>
    </div>

    <!-- Аккордеон характеристик -->
    <button class="accordion-btn" onclick="toggleAcc(this)">Характеристика предложения</button>
    <div class="accordion-content" id="char-panel">
        
        <div class="char-row">
            <div class="char-title">По цели высказывания:</div>
            <div class="tags-group">
                <button class="tag-btn" onclick="selectTag(this, 'celi')">Повествовательное</button>
                <button class="tag-btn" onclick="selectTag(this, 'celi')">Вопросительное</button>
                <button class="tag-btn" onclick="selectTag(this, 'celi')">Побудительное</button>
            </div>
        </div>

        <div class="char-row">
            <div class="char-title">По интонации:</div>
            <div class="tags-group">
                <button class="tag-btn" onclick="selectTag(this, 'int')">Восклицательное</button>
                <button class="tag-btn" onclick="selectTag(this, 'int')">Невосклицательное</button>
            </div>
        </div>

        <div class="char-row">
            <div class="char-title">По количеству грамматических основ:</div>
            <div class="tags-group">
                <button class="tag-btn" onclick="selectTag(this, 'osnov')">Простое</button>
                <button class="tag-btn" onclick="selectTag(this, 'osnov')">Сложное</button>
            </div>
        </div>

        <div class="char-row">
            <div class="char-title">По количеству главных членов:</div>
            <div class="tags-group">
                <button class="tag-btn" onclick="selectTag(this, 'chlen'); hideOdno()">Двусоставное</button>
                <button class="tag-btn" onclick="selectTag(this, 'chlen'); showOdno()">Односоставное</button>
            </div>
            <!-- Подменю односоставного -->
            <div class="tags-group" id="sub-odno">
                <button class="tag-btn" onclick="selectTag(this, 'sub')">Назывное</button>
                <button class="tag-btn" onclick="selectTag(this, 'sub')">Определённо-личное</button>
                <button class="tag-btn" onclick="selectTag(this, 'sub')">Неопределённо-личное</button>
                <button class="tag-btn" onclick="selectTag(this, 'sub')">Безличное</button>
            </div>
        </div>
    </div>

    <!-- Рисование схемы -->
    <div class="canvas-container">
        <div class="char-title">Нарисуйте схему предложения (ССП, СПП, БСП):</div>
        <canvas id="schemeCanvas"></canvas>
        <button class="clear-btn" onclick="clearCanvas()">Очистить холст</button>
    </div>

<script>
    // --- Логика Аккордеона и Тегов ---
    function toggleAcc(btn) {
        btn.classList.toggle('active');
        document.getElementById('char-panel').classList.toggle('show');
    }

    function selectTag(btn, group) {
        // Убираем выделение у соседей
        btn.parentElement.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function showOdno() { document.getElementById('sub-odno').classList.add('show'); }
    function hideOdno() { 
        document.getElementById('sub-odno').classList.remove('show'); 
        document.querySelectorAll('#sub-odno .tag-btn').forEach(b => b.classList.remove('selected'));
    }

    // --- Логика Перетаскивания (Drag & Drop) ---
    function dragStart(ev, type) {
        ev.dataTransfer.setData("type", type);
    }
    
    function allowDrop(ev) {
        ev.preventDefault();
        ev.target.classList.add('drag-over');
    }

    // Убираем подсветку при уходе мыши
    document.querySelectorAll('.word-drop').forEach(el => {
        el.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
    });

    function dropLine(ev) {
        ev.preventDefault();
        ev.target.classList.remove('drag-over');
        const type = ev.dataTransfer.getData("type");
        
        if(ev.target.classList.contains('word-drop')) {
            // Очищаем старые стили
            ev.target.className = 'word-drop';
            if (type !== 'clear') {
                ev.target.classList.add(type);
            }
        }
    }

    // --- Логика Рисования на Canvas ---
    const canvas = document.getElementById('schemeCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Подгоняем размер холста
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth - 30;
        canvas.height = 150;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    ctx.lineWidth = 3;
    ctx.strokeStyle = '#4a3b52';
    ctx.lineCap = 'round';

    function startDraw(e) {
        isDrawing = true;
        draw(e);
    }

    function stopDraw() {
        isDrawing = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault(); // предотвращаем скроллинг на телефоне
        
        let x, y;
        if (e.type.includes('touch')) {
            const rect = canvas.getBoundingClientRect();
            x = e.touches[0].clientX - rect.left;
            y = e.touches[0].clientY - rect.top;
        } else {
            x = e.offsetX;
            y = e.offsetY;
        }

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    // События мыши
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseout', stopDraw);

    // События тачскрина
    canvas.addEventListener('touchstart', startDraw, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDraw);

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
<\/script>
</body>
</html>`;
            
            // Вывод кода
            document.getElementById('code-output').value = studentHTML;

            // Надежный предпросмотр через Blob URL (решает проблему с iframe srcdoc)
            const blob = new Blob([studentHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-frame').src = url;
        }

        // Запуск при загрузке страницы
        window.onload = generateApp;
    </script>
</body>
</html>
