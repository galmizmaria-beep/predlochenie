<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор игры: Синтаксический разбор</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #658c98;
            --bg-clouds: #e9f4f7;
            --paper-bg: #fdf5eb;
            --accent-red: #d46b54;
            --text-dark: #4a3b52;
            --correct-green: #81c784;
            --wrong-red: #e57373;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-clouds);
            color: var(--text-dark);
        }

        .header { background-color: var(--bg-top); padding: 30px 20px 50px 20px; text-align: center; position: relative; }
        .header h1 { font-family: 'Caveat', cursive; color: white; font-size: 2.5rem; margin: 0; }
        .clouds-divider { position: absolute; bottom: -1px; left: 0; width: 100%; height: 40px; background-image: radial-gradient(circle at 20px 0, transparent 20px, var(--bg-clouds) 21px); background-size: 40px 100%; background-repeat: repeat-x; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .panel { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        h2 { color: var(--accent-red); margin-top: 0; }
        
        /* Стили генератора (Учительская часть) */
        .step { border-left: 4px solid var(--accent-red); padding-left: 15px; margin-bottom: 25px; }
        textarea, select, input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 1rem; box-sizing: border-box; margin-top: 10px; }
        button { background-color: var(--accent-red); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,107,84,0.3); }

        #word-mapper { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .word-setup-card { background: var(--paper-bg); padding: 10px; border-radius: 10px; border: 1px solid #ccc; text-align: center; min-width: 120px;}
        .word-setup-card strong { display: block; margin-bottom: 5px; font-size: 1.1rem;}

        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        
        /* Разметка окна кода */
        .workspace { display: flex; gap: 20px; }
        .col { flex: 1; min-width: 0; }
        #code-output { background: #2b2b2b; color: #a9b7c6; font-family: monospace; height: 300px; font-size: 12px;}
        iframe { width: 100%; height: 600px; border: 2px dashed #ccc; border-radius: 10px; background: white; }

    </style>
</head>
<body>

    <div class="header">
        <h1>Конструктор игры: Синтаксический разбор</h1>
        <div class="clouds-divider"></div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Шаг 1: Настройка правильных ответов</h2>
            
            <div class="step">
                <label><strong>1. Введите предложение:</strong></label>
                <textarea id="sentence-input" rows="2">Наступила золотая осень.</textarea>
                <button onclick="parseWords()">Разбить на слова</button>
            </div>

            <div class="step" id="step-words" style="display:none;">
                <label><strong>2. Укажите правильную роль для каждого слова:</strong></label>
                <div id="word-mapper"></div>
            </div>

            <div class="step">
                <label><strong>3. Выберите правильные характеристики предложения:</strong></label>
                <div class="settings-grid">
                    <div>
                        <label>По цели высказывания:</label>
                        <select id="ans-celi">
                            <option value="повествовательное">Повествовательное</option>
                            <option value="вопросительное">Вопросительное</option>
                            <option value="побудительное">Побудительное</option>
                        </select>
                    </div>
                    <div>
                        <label>По интонации:</label>
                        <select id="ans-int">
                            <option value="невосклицательное">Невосклицательное</option>
                            <option value="восклицательное">Восклицательное</option>
                        </select>
                    </div>
                    <div>
                        <label>По кол-ву грам. основ:</label>
                        <select id="ans-osnov">
                            <option value="простое">Простое</option>
                            <option value="сложное">Сложное</option>
                        </select>
                    </div>
                    <div>
                        <label>По кол-ву главных членов:</label>
                        <select id="ans-chlen" onchange="toggleSubOdno()">
                            <option value="двусоставное">Двусоставное</option>
                            <option value="односоставное">Односоставное</option>
                        </select>
                    </div>
                    <div id="sub-odno-wrap" style="display:none;">
                        <label>Тип односоставного:</label>
                        <select id="ans-sub">
                            <option value="назывное">Назывное</option>
                            <option value="определённо-личное">Определённо-личное</option>
                            <option value="неопределённо-личное">Неопределённо-личное</option>
                            <option value="безличное">Безличное</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="generateGame()" style="width: 100%; padding: 15px; font-size: 1.2rem; background-color: #4CAF50;">Сгенерировать игру для Genially</button>
        </div>

        <div class="workspace">
            <div class="col panel">
                <h2>Код для вставки</h2>
                <p style="font-size: 0.9rem;">Скопируйте код -> Genially -> Insert -> Others -> HTML code. Растяните рамку на весь слайд.</p>
                <textarea id="code-output" readonly></textarea>
                <button onclick="copyCode()">Скопировать код</button>
            </div>
            <div class="col panel">
                <h2>Предпросмотр игры</h2>
                <iframe id="preview-frame"></iframe>
            </div>
        </div>
    </div>

    <script>
        let wordsArray = [];

        function parseWords() {
            const text = document.getElementById('sentence-input').value.trim();
            // Убираем знаки препинания для чистоты, но оставляем их для отображения
            wordsArray = text.split(/\s+/);
            
            const mapper = document.getElementById('word-mapper');
            mapper.innerHTML = '';
            
            wordsArray.forEach((word, index) => {
                const cleanWord = word.replace(/[.,!?]/g, '');
                mapper.innerHTML += `
                    <div class="word-setup-card">
                        <strong>${word}</strong>
                        <select id="role-${index}">
                            <option value="none">Нет (предлог/союз)</option>
                            <option value="subject">Подлежащее</option>
                            <option value="predicate">Сказуемое</option>
                            <option value="object">Дополнение</option>
                            <option value="attribute">Определение</option>
                            <option value="adverbial">Обстоятельство</option>
                        </select>
                    </div>
                `;
            });
            document.getElementById('step-words').style.display = 'block';
        }

        function toggleSubOdno() {
            const val = document.getElementById('ans-chlen').value;
            document.getElementById('sub-odno-wrap').style.display = val === 'односоставное' ? 'block' : 'none';
        }

        function copyCode() {
            const code = document.getElementById('code-output');
            code.select();
            document.execCommand('copy');
            alert('Код скопирован! Вставьте в Genially.');
        }

        function generateGame() {
            if (wordsArray.length === 0) parseWords();

            // Собираем правильные ответы
            const correctRoles = {};
            wordsArray.forEach((_, index) => {
                correctRoles[index] = document.getElementById(`role-${index}`).value;
            });

            const config = {
                words: wordsArray,
                correctRoles: correctRoles,
                chars: {
                    celi: document.getElementById('ans-celi').value,
                    int: document.getElementById('ans-int').value,
                    osnov: document.getElementById('ans-osnov').value,
                    chlen: document.getElementById('ans-chlen').value,
                    sub: document.getElementById('ans-sub').value
                }
            };

            // Генерируем слова для HTML (со спанами для перетаскивания)
            const wordsHtml = wordsArray.map((w, i) => `<span class="word-drop" data-index="${i}">${w}</span>`).join(' ');

            // ВНИМАНИЕ: Здесь начинается HTML ученика. Он автономен и не зависит от генератора после создания.

<script>
    // Конфигурация правильных ответов, загруженная из генератора
    const CONFIG = ${JSON.stringify(config)};

    // --- Логика Аккордеона ---
    function toggleAcc(btn) {
        btn.classList.toggle('active');
        document.getElementById('char-panel').classList.toggle('show');
    }

    // --- Логика проверки ответов (Кнопки) ---
    function checkAnswer(btn, category, value) {
        const correctValue = CONFIG.chars[category];
        
        if (value === correctValue) {
            btn.classList.add('correct');
            // Если выбрали односоставное и это правильно, показываем подменю
            if (category === 'chlen' && value === 'односоставное') {
                document.getElementById('sub-odno').classList.add('show');
            }
        } else {
            btn.classList.add('wrong');
            // Убираем красное выделение через секунду, чтобы ребенок мог попробовать еще раз
            setTimeout(() => {
                btn.classList.remove('wrong');
                btn.style.pointerEvents = 'auto'; // возвращаем кликабельность
            }, 1000);
        }
    }

    // --- Логика Drag & Drop для членов предложения ---
    const drags = document.querySelectorAll('.drag-item');
    const drops = document.querySelectorAll('.word-drop');

    drags.forEach(drag => {
        drag.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('role', drag.getAttribute('data-role'));
            e.dataTransfer.effectAllowed = 'copy';
        });
    });

    drops.forEach(drop => {
        drop.addEventListener('dragover', (e) => {
            e.preventDefault(); // Разрешаем сброс
            drop.classList.add('drag-over');

        if(e.type.includes('touch')) e.preventDefault(); // блокируем скролл при рисовании
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        if(e.type.includes('touch')) e.preventDefault();
    }

    function stopDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseout', stopDraw);
    
    canvas.addEventListener('touchstart', startDraw, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDraw);

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
