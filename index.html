<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор: Синтаксический разбор (Faëria Style)</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;600;800&family=Montserrat:wght@500;700&family=Comfortaa:wght@700&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600&family=Pacifico&family=Neucha&family=Russo+One&family=Cinzel:wght@600;800&family=Lobster&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
<style>
    :root {
        --bg-deep: #0c1a1f;
        --bg-panel: #14282e;
        --bg-panel-2: #1c343c;
        --teal-glow: #2ec6d6;
        --teal-soft: #3aa9b8;
        --gold: #e8b25a;
        --gold-bright: #ffcf7a;
        --text-light: #cfe6ea;
        --text-mute: #7e9aa1;
        --border-gold: rgba(232,178,90,0.35);
    }
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        font-family: 'Nunito', sans-serif;
        background:
            radial-gradient(ellipse at top, #1b3a42 0%, #0c1a1f 60%),
            var(--bg-deep);
        color: var(--text-light);
        min-height: 100vh;
    }

    /* ===== ЗАГОЛОВОК ===== */
    .top-header {
        text-align: center; padding: 25px 20px 15px;
        border-bottom: 1px solid var(--border-gold);
        background: linear-gradient(180deg, rgba(46,198,214,0.08), transparent);
    }
    .top-header h1 {
        font-family: 'Cinzel', serif; font-weight: 800;
        color: var(--gold-bright); margin: 0; font-size: 2rem;
        letter-spacing: 3px;
        text-shadow: 0 0 18px rgba(46,198,214,0.5), 0 2px 4px #000;
    }
    .top-header p { color: var(--text-mute); margin: 6px 0 0; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;}

    /* ===== МАКЕТ 2 КОЛОНКИ ===== */
    .layout {
        display: flex; gap: 22px;
        max-width: 1500px; margin: 22px auto; padding: 0 22px;
        align-items: flex-start;
    }
    .col-left { flex: 1 1 50%; min-width: 380px; }
    .col-right { flex: 1 1 50%; min-width: 380px; position: sticky; top: 22px; }

    /* ===== ПАНЕЛИ ===== */
    .panel {
        background: linear-gradient(160deg, var(--bg-panel-2), var(--bg-panel));
        border: 1px solid var(--border-gold);
        border-radius: 14px; padding: 20px;
        margin-bottom: 18px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .panel h2 {
        font-family: 'Cinzel', serif; color: var(--gold);
        margin: 0 0 16px; font-size: 1.15rem; letter-spacing: 1px;
        padding-bottom: 10px; border-bottom: 1px solid var(--border-gold);
        display: flex; align-items: center; gap: 10px;
    }
    .panel h2::before {
        content: ''; width: 8px; height: 18px; border-radius: 2px;
        background: linear-gradient(var(--gold-bright), var(--teal-glow));
        box-shadow: 0 0 10px var(--teal-glow);
    }
    .step { margin-bottom: 18px; }
    label { font-weight: 600; font-size: 0.9rem; color: var(--text-light); }
    .hint { font-size: 0.8rem; color: var(--text-mute); margin: 4px 0 0; }

    textarea, select, input {
        width: 100%; padding: 10px; margin-top: 8px;
        background: #0d1c21; color: var(--text-light);
        border: 1px solid rgba(58,169,184,0.4); border-radius: 9px;
        font-family: inherit; font-size: 0.95rem; outline: none;
        transition: 0.2s;
    }
    textarea:focus, select:focus, input:focus {
        border-color: var(--teal-glow);
        box-shadow: 0 0 0 3px rgba(46,198,214,0.15);
    }
    select option { background: #0d1c21; }
    input[type="color"] { height: 42px; padding: 3px; cursor: pointer; }

    button {
        font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer;
        border: none; transition: 0.2s; letter-spacing: 0.5px;
    }
    .btn-gold {
        background: linear-gradient(180deg, var(--gold-bright), var(--gold));
        color: #2a1c08; padding: 9px 18px; border-radius: 20px;
        box-shadow: 0 0 12px rgba(232,178,90,0.4);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 4px 18px rgba(232,178,90,0.6); }
    .btn-teal {
        background: linear-gradient(180deg, var(--teal-glow), var(--teal-soft));
        color: #04181c; width: 100%; padding: 15px; border-radius: 24px;
        font-size: 1.1rem; margin-top: 16px;
        box-shadow: 0 0 18px rgba(46,198,214,0.5);
    }
    .btn-teal:hover { transform: translateY(-2px); box-shadow: 0 6px 26px rgba(46,198,214,0.7); }

    /* ===== СЛОВА ===== */
    #word-mapper { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 12px; }
    .word-setup-card {
        background: #0d1c21; padding: 12px; border-radius: 10px;
        border: 1px solid rgba(58,169,184,0.3);
    }
    .word-setup-card strong {
        display: block; margin-bottom: 8px; text-align: center;
        color: var(--gold-bright); font-size: 1.1rem;
        font-family: 'Caveat', cursive;
    }
    .word-setup-card label { font-size: 0.72rem; color: var(--text-mute); }
    .word-setup-card select { padding: 6px; font-size: 0.82rem; margin-top: 3px; }

    .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
    .field { display: flex; flex-direction: column; }
    .field label { margin-bottom: 2px; }

    /* ===== ПРЕДПРОСМОТР 16:9 ===== */
    .preview-shell { padding: 16px; }
    .preview-frame-wrap {
        position: relative; width: 100%;
        padding-top: 56.25%; /* 16:9 */
        border-radius: 10px; overflow: hidden;
        border: 2px solid var(--border-gold);
        box-shadow: 0 0 25px rgba(46,198,214,0.2), inset 0 0 40px rgba(0,0,0,0.5);
        background: #04181c;
    }
    .preview-frame-wrap iframe {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%; border: none;
    }
    .copy-row { margin-top: 16px; }
    #copy-btn { width: 100%; padding: 15px; font-size: 1.05rem; border-radius: 24px;
        background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #2a1c08;
        box-shadow: 0 0 16px rgba(232,178,90,0.4);
    }
    #copy-btn:hover { transform: translateY(-2px); }
    .copy-hint { font-size: 0.78rem; color: var(--text-mute); margin-top: 10px; line-height: 1.5; }
    .copy-hint b { color: var(--teal-glow); }
    #code-output { position: absolute; left: -9999px; opacity: 0; }

    @media (max-width: 950px) {
        .layout { flex-direction: column; }
        .col-right { position: static; }
    }
</style>
</head>
<body>

<div class="top-header">
    <h1>FAËRIA · РАЗБОР</h1>
    <p>Конструктор игры «Синтаксический разбор»</p>
</div>

<div class="layout">

    <!-- ЛЕВАЯ КОЛОНКА: ВСЕ РАЗДЕЛЫ -->
    <div class="col-left">

        <div class="panel">
            <h2>Внешний вид</h2>
            <div class="settings-grid">
                <div class="field"><label>Цвет фона</label><input type="color" id="set-bg" value="#0c1a1f"></div>
                <div class="field"><label>Кнопка «Разбор»</label><input type="color" id="set-btn" value="#e8b25a"></div>
                <div class="field"><label>Кнопка «Проверить»</label><input type="color" id="set-btn-check" value="#2ec6d6"></div>
                <div class="field"><label>Неоновое свечение</label><input type="color" id="set-glow" value="#2ec6d6"></div>
                <div class="field"><label>Шрифт предложений</label>
                    <select id="set-font">
                        <option value="'Nunito', sans-serif">Nunito</option>
                        <option value="'Montserrat', sans-serif">Montserrat</option>
                        <option value="'Comfortaa', cursive">Comfortaa</option>
                        <option value="'Neucha', cursive">Neucha</option>
                        <option value="'Pacifico', cursive">Pacifico</option>
                        <option value="'Caveat', cursive">Caveat</option>
                        <option value="'Russo One', sans-serif">Russo One</option>
                        <option value="'Roboto', sans-serif">Roboto</option>
                    </select>
                </div>
                <div class="field"><label>Размер шрифта</label>
                    <select id="set-size">
                        <option value="16px">Стандартный</option>
                        <option value="18px" selected>Крупный</option>
                        <option value="22px">Очень крупный</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Предложение</h2>
            <div class="step">
                <label>1. Введите предложение</label>
                <textarea id="sentence-input" rows="2">Наступила золотая осень.</textarea>
                <button class="btn-gold" style="margin-top:10px;" onclick="parseWords()">Разбить на слова</button>
            </div>
            <div class="step" id="step-words" style="display:none;">
                <label>2. Роль и часть речи каждого слова</label>
                <div id="word-mapper"></div>
            </div>
        </div>

        <div class="panel">
            <h2>Характеристики</h2>
            <div class="settings-grid">
                <div class="field"><label>По цели высказывания</label><select id="ans-celi"><option value="повествовательное">Повествовательное</option><option value="вопросительное">Вопросительное</option><option value="побудительное">Побудительное</option></select></div>
                <div class="field"><label>По интонации</label><select id="ans-int"><option value="невосклицательное">Невосклицательное</option><option value="восклицательное">Восклицательное</option></select></div>
                <div class="field"><label>По грам. основам</label><select id="ans-osnov"><option value="простое">Простое</option><option value="сложное">Сложное</option></select></div>
                <div class="field"><label>По второст. членам</label><select id="ans-raspr"><option value="распространённое">Распространённое</option><option value="нераспространённое">Нераспространённое</option></select></div>
                <div class="field"><label>По главным членам</label><select id="ans-chlen" onchange="toggleSubOdno()"><option value="двусоставное">Двусоставное</option><option value="односоставное">Односоставное</option></select></div>
                <div class="field" id="sub-indigo-wrap" style="display:none;"><label>Тип односоставного</label><select id="ans-sub"><option value="назывное">Назывное</option><option value="определённо-личное">Определённо-личное</option><option value="неопределённо-личное">Неопределённо-личное</option><option value="безличное">Безличное</option></select></div>
            </div>
            <button class="btn-teal" onclick="generateGame()">Сгенерировать игру</button>
        </div>

    </div>

    <!-- ПРАВАЯ КОЛОНКА: ПРЕДПРОСМОТР + КОПИРОВАНИЕ -->
    <div class="col-right">
        <div class="panel preview-shell">
            <h2>Предпросмотр (16:9)</h2>
            <div class="preview-frame-wrap">
                <iframe id="preview-frame"></iframe>
            </div>
            <div class="copy-row">
                <textarea id="code-output" readonly></textarea>
                <button id="copy-btn" onclick="copyCode()">📋 Скопировать код</button>
                <p class="copy-hint">Вставьте код в Genially: <b>Вставка → Другое → HTML-код</b>, затем растяните блок на весь слайд.</p>
            </div>
        </div>
    </div>

</div>

<script>
    let wordsArray = [];
    const partsOfSpeech = ["имя существительное","имя прилагательное","имя числительное","местоимение","глагол","причастие","деепричастие","наречие","союз","предлог","частица","междометие","нет"];

    function parseWords() {
        let text = document.getElementById('sentence-input').value.trim();
        wordsArray = text.split(/\s+/);
        const mapper = document.getElementById('word-mapper');
        mapper.innerHTML = '';
        let posOptions = partsOfSpeech.map(p => `<option value="${p}">${p}</option>`).join('');

        wordsArray.forEach((word, index) => {
            mapper.innerHTML += `
                <div class="word-setup-card">
                    <strong>${word}</strong>
                    <label>Член предложения:</label>
                    <select id="role-${index}">
                        <option value="none">Нет</option>
                        <option value="subject">Подлежащее</option>
                        <option value="predicate">Сказуемое</option>
                        <option value="object">Дополнение</option>
                        <option value="attribute">Определение</option>
                        <option value="adverbial">Обстоятельство</option>
                    </select>
                    <label>Часть речи:</label>
                    <select id="pos-${index}">${posOptions}</select>
                </div>`;
        });
        document.getElementById('step-words').style.display = 'block';

        if (text === "Наступила золотая осень.") {
            if (document.getElementById('role-0')) { document.getElementById('role-0').value = "predicate"; document.getElementById('pos-0').value = "глагол"; }
            if (document.getElementById('role-1')) { document.getElementById('role-1').value = "attribute"; document.getElementById('pos-1').value = "имя прилагательное"; }
            if (document.getElementById('role-2')) { document.getElementById('role-2').value = "subject"; document.getElementById('pos-2').value = "имя существительное"; }
        }
    }

    function toggleSubOdno() {
        document.getElementById('sub-indigo-wrap').style.display =
            document.getElementById('ans-chlen').value === 'односоставное' ? 'flex' : 'none';
    }

    function copyCode() {
        const code = document.getElementById('code-output');
        code.select();
        document.execCommand('copy');
        const btn = document.getElementById('copy-btn');
        const t = btn.innerText;
        btn.innerText = '✅ Скопировано!';
        setTimeout(() => btn.innerText = t, 2000);
    }

    function generateGame() {
        if (wordsArray.length === 0) parseWords();
        const correctData = { roles: {}, pos: {} };
        wordsArray.forEach((_, i) => {
            correctData.roles[i] = document.getElementById(`role-${i}`).value;
            correctData.pos[i] = document.getElementById(`pos-${i}`).value;
        });
        const config = {
            correct: correctData,
            chars: {
                celi: document.getElementById('ans-celi').value,
                int: document.getElementById('ans-int').value,
                osnov: document.getElementById('ans-osnov').value,
                raspr: document.getElementById('ans-raspr').value,
                chlen: document.getElementById('ans-chlen').value,
                sub: document.getElementById('ans-chlen').value === 'односоставное' ? document.getElementById('ans-sub').value : ''
            },
            styles: {
                bg: document.getElementById('set-bg').value,
                btn: document.getElementById('set-btn').value,
                btnCheck: document.getElementById('set-btn-check').value,
                glow: document.getElementById('set-glow').value,
                font: document.getElementById('set-font').value,
                size: document.getElementById('set-size').value
            }
        };

        const posOptionsHTML = `<option value="none">Часть речи...</option>` + partsOfSpeech.map(p => `<option value="${p}">${p}</option>`).join('');
        const wordsHtml = wordsArray.map((w, i) => `
            <div class="word-col">
                <select class="student-pos" data-index="${i}">${posOptionsHTML}</select>
                <span class="word-drop" data-index="${i}">${w}</span>
            </div>`).join('');
        const safeConfigString = JSON.stringify(config);

        const studentHTML = `<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;600;800&family=Montserrat:wght@500;700&family=Comfortaa:wght@700&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600&family=Pacifico&family=Neucha&family=Russo+One&family=Cinzel:wght@600;800&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
<style>
    :root {
        --game-bg: ${config.styles.bg};
        --game-btn: ${config.styles.btn};
        --game-btn-check: ${config.styles.btnCheck};
        --game-glow: ${config.styles.glow};
        --game-font: ${config.styles.font};
        --game-size: ${config.styles.size};
    }
    html, body { margin:0; padding:0; width:100%; height:100%;
        font-family:'Nunito',sans-serif;
        background: radial-gradient(ellipse at top, #1b3a42, var(--game-bg) 70%), var(--game-bg);
        color:#cfe6ea; box-sizing:border-box; overflow:hidden; font-size:var(--game-size); }
    .game-container { padding:15px; width:100%; height:100%; box-sizing:border-box; display:flex; flex-direction:column; overflow-y:auto; }
    .sentence-box { background:rgba(13,28,33,0.7); padding:20px; border-radius:15px; border:1px solid rgba(232,178,90,0.3);
        box-shadow:0 0 25px rgba(46,198,214,0.15); text-align:center; margin-bottom:15px;
        display:flex; flex-wrap:wrap; justify-content:center; gap:10px; align-items:flex-end; font-family:var(--game-font),sans-serif; }
    .word-col { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .student-pos { font-family:var(--game-font),sans-serif; font-size:0.7em; padding:2px; border:1px solid #3aa9b8; border-radius:5px; background:#0d1c21; color:#cfe6ea; max-width:100px; outline:none; transition:0.3s; cursor:pointer; }
    .student-pos.correct { background:#1e5631; border-color:#4CAF50; color:#fff; }
    .student-pos.wrong { background:#5e1c1c; border-color:#f44336; color:#fff; }
    .word-drop { font-family:var(--game-font),sans-serif; padding:2px 5px; border-radius:5px; transition:0.2s; display:inline-block; border:2px solid transparent; cursor:pointer; font-size:1.2em; position:relative; color:#fff; }
    .word-drop.drag-over { background:rgba(46,198,214,0.1); border-color:var(--game-btn); border-style:dashed; }
    .ans-subject { border-bottom:2px solid #ffcf7a; border-radius:0; border-top:none; border-left:none; border-right:none;}
    .ans-predicate { border-bottom:4px double #ffcf7a; border-radius:0; border-top:none; border-left:none; border-right:none;}
    .ans-object { border-bottom:2px dashed #ffcf7a; border-radius:0; border-top:none; border-left:none; border-right:none;}
    .ans-attribute { text-decoration:underline wavy #ffcf7a 2px; text-underline-offset:4px; border:none; }
    .ans-adverbial { background-image:repeating-linear-gradient(to right,#ffcf7a 0,#ffcf7a 8px,transparent 8px,transparent 12px,#ffcf7a 12px,#ffcf7a 16px,transparent 16px,transparent 20px); background-position:bottom; background-size:100% 2px; background-repeat:no-repeat; padding-bottom:4px; border:none; }
    .word-drop.correct-line { color:#7CFC00 !important; }
    .word-drop.ans-subject.correct-line, .word-drop.ans-predicate.correct-line, .word-drop.ans-object.    .word-drop.ans-object.correct-line, .word-drop.ans-attribute.correct-line, .word-drop.ans-adverbial.correct-line { color:#fff !important; }

    .controls { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:15px; }
    .role-btn { font-family:'Nunito',sans-serif; font-weight:800; cursor:pointer; border:none;
        padding:8px 14px; border-radius:18px; color:#04181c;
        background:var(--game-btn); box-shadow:0 0 10px var(--game-glow); transition:0.2s; font-size:0.8em; }
    .role-btn:hover { transform:translateY(-2px); }
    .role-btn.active { outline:3px solid #fff; }

    .chars-box { background:rgba(13,28,33,0.7); padding:15px; border-radius:15px; border:1px solid rgba(232,178,90,0.3); margin-bottom:15px; }
    .chars-box h3 { font-family:'Cinzel',serif; color:var(--game-btn); margin:0 0 12px; text-align:center; font-size:0.95em; letter-spacing:1px; }
    .char-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; }
    .char-field { display:flex; flex-direction:column; gap:4px; }
    .char-field label { font-size:0.7em; color:#7e9aa1; }
    .char-field select { font-family:var(--game-font),sans-serif; padding:6px; border:1px solid #3aa9b8; border-radius:8px; background:#0d1c21; color:#cfe6ea; outline:none; font-size:0.8em; }
    .char-field select.correct { background:#1e5631; border-color:#4CAF50; color:#fff; }
    .char-field select.wrong { background:#5e1c1c; border-color:#f44336; color:#fff; }

    .check-btn { font-family:'Nunito',sans-serif; font-weight:800; cursor:pointer; border:none;
        padding:14px; border-radius:24px; color:#04181c; width:100%; font-size:1em;
        background:var(--game-btn-check); box-shadow:0 0 18px var(--game-glow); transition:0.2s; margin-top:auto; }
    .check-btn:hover { transform:translateY(-2px); }

    .result-msg { text-align:center; font-family:'Cinzel',serif; font-size:1.1em; margin-top:12px; min-height:24px; }
    .result-msg.win { color:#7CFC00; text-shadow:0 0 12px rgba(124,252,0,0.5); }
    .result-msg.lose { color:#ff7a7a; }
    .legend { text-align:center; font-size:0.65em; color:#7e9aa1; margin-bottom:10px; }
</style>
</head>
<body>
<div class="game-container">

    <div class="legend">Подлежащее — одна черта · Сказуемое — две · Дополнение — пунктир · Определение — волна · Обстоятельство — точка-тире</div>

    <div class="sentence-box" id="sentence-box">${wordsHtml}</div>

    <div class="controls">
        <button class="role-btn" data-role="subject" style="border-bottom:3px solid #fff;">Подлежащее</button>
        <button class="role-btn" data-role="predicate">Сказуемое</button>
        <button class="role-btn" data-role="object">Дополнение</button>
        <button class="role-btn" data-role="attribute">Определение</button>
        <button class="role-btn" data-role="adverbial">Обстоятельство</button>
        <button class="role-btn" data-role="none" style="background:#7e9aa1;">Стереть</button>
    </div>

    <div class="chars-box">
        <h3>Характеристика предложения</h3>
        <div class="char-row">
            <div class="char-field"><label>По цели высказывания</label><select id="g-celi"><option value="none">—</option><option value="повествовательное">Повествовательное</option><option value="вопросительное">Вопросительное</option><option value="побудительное">Побудительное</option></select></div>
            <div class="char-field"><label>По интонации</label><select id="g-int"><option value="none">—</option><option value="невосклицательное">Невосклицательное</option><option value="восклицательное">Восклицательное</option></select></div>
            <div class="char-field"><label>По грам. основам</label><select id="g-osnov"><option value="none">—</option><option value="простое">Простое</option><option value="сложное">Сложное</option></select></div>
            <div class="char-field"><label>По второст. членам</label><select id="g-raspr"><option value="none">—</option><option value="распространённое">Распространённое</option><option value="нераспространённое">Нераспространённое</option></select></div>
            <div class="char-field"><label>По главным членам</label><select id="g-chlen"><option value="none">—</option><option value="двусоставное">Двусоставное</option><option value="односоставное">Односоставное</option></select></div>
            <div class="char-field" id="g-sub-wrap" style="display:none;"><label>Тип односоставного</label><select id="g-sub"><option value="none">—</option><option value="назывное">Назывное</option><option value="определённо-личное">Определённо-личное</option><option value="неопределённо-личное">Неопределённо-личное</option><option value="безличное">Безличное</option></select></div>
        </div>
    </div>

    <button class="check-btn" id="check-btn">✓ Проверить</button>
    <div class="result-msg" id="result-msg"></div>

</div>

<script>
(function(){
    var CONFIG = ${safeConfigString};
    var currentRole = null;
    var assigned = {}; // index -> role

    // === Холст / адаптация под Genially: следим за размером постоянно ===
    function safeResize() {
        try {
            // ничего критичного — просто гарантируем, что body не схлопнут
            if (document.body) { document.body.style.minHeight = '100%'; }
        } catch(e) {}
    }
    if (window.ResizeObserver) {
        try { new ResizeObserver(safeResize).observe(document.documentElement); } catch(e) {}
    }
    var resizeTimer = setInterval(safeResize, 500);
    setTimeout(function(){ clearInterval(resizeTimer); }, 8000);
    window.addEventListener('resize', safeResize);

    // === Выбор роли ===
    var roleBtns = document.querySelectorAll('.role-btn');
    roleBtns.forEach(function(btn){
        btn.addEventListener('click', function(){
            roleBtns.forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            currentRole = btn.getAttribute('data-role');
        });
    });

    // === Назначение роли слову ===
    var drops = document.querySelectorAll('.word-drop');
    drops.forEach(function(word){
        word.addEventListener('click', function(){
            if (currentRole === null) return;
            var idx = word.getAttribute('data-index');
            ['ans-subject','ans-predicate','ans-object','ans-attribute','ans-adverbial'].forEach(function(c){ word.classList.remove(c); });
            word.classList.remove('correct-line');
            if (currentRole === 'none') {
                delete assigned[idx];
            } else {
                word.classList.add('ans-' + currentRole);
                assigned[idx] = currentRole;
            }
        });
    });

    // === Показ типа односоставного ===
    var chlenSel = document.getElementById('g-chlen');
    chlenSel.addEventListener('change', function(){
        document.getElementById('g-sub-wrap').style.display = (chlenSel.value === 'односоставное') ? 'flex' : 'none';
    });

    // === Проверка ===
    document.getElementById('check-btn').addEventListener('click', function(){
        var total = 0, correct = 0;

        // 1. Члены предложения
        for (var i in CONFIG.correct.roles) {
            total++;
            var word = document.querySelector('.word-drop[data-index="' + i + '"]');
            var expected = CONFIG.correct.roles[i];
            var got = assigned[i] || 'none';
            if (got === expected) {
                correct++;
                word.classList.add('correct-line');
            } else {
                word.classList.remove('correct-line');
            }
        }

        // 2. Части речи
        document.querySelectorAll('.student-pos').forEach(function(sel){
            total++;
            var i = sel.getAttribute('data-index');
            sel.classList.remove('correct','wrong');
            if (sel.value === CONFIG.correct.pos[i]) {
                correct++;
                sel.classList.add('correct');
            } else {
                sel.classList.add('wrong');
            }
        });

        // 3. Характеристики
        var charMap = [
            ['g-celi', CONFIG.chars.celi],
            ['g-int', CONFIG.chars.int],
            ['g-osnov', CONFIG.chars.osnov],
            ['g-raspr', CONFIG.chars.raspr],
            ['g-chlen', CONFIG.chars.chlen]
        ];
        if (CONFIG.chars.chlen === 'односоставное') {
            charMap.push(['g-sub', CONFIG.chars.sub]);
        }
        charMap.forEach(function(pair){
            var sel = document.getElementById(pair[0]);
            if (!sel) return;
            total++;
            sel.classList.remove('correct','wrong');
            if (sel.value === pair[1]) {
                correct++;
                sel.classList.add('correct');
            } else {
                sel.classList.add('wrong');
            }
        });

        // === Результат ===
        var msg = document.getElementById('result-msg');
        if (correct === total) {
            msg.textContent = '🏆 Победа! Разбор выполнен верно!';
            msg.className = 'result-msg win';
        } else {
            msg.textContent = 'Верно ' + correct + ' из ' + total + '. Исправь ошибки!';
            msg.className = 'result-msg lose';
        }
    });

    safeResize();
})();
<\/script>
</body>
</html>`;

        // === Вывод в предпросмотр и в textarea для копирования ===
        document.getElementById('code-output').value = studentHTML;
        var frame = document.getElementById('preview-frame');
        frame.srcdoc = studentHTML;
    }

    // Автозапуск при загрузке конструктора
    window.addEventListener('load', function(){
        parseWords();
        generateGame();
    });
</script>

</body>
</html>
