<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор игры: Синтаксический разбор</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;600;800&family=Montserrat:wght@500;700&family=Comfortaa:wght@700&family=Roboto:wght@400;500;700&display=swap&subset=cyrillic" rel="stylesheet">
    <style>
        :root {
            --bg-top: #658c98; --bg-clouds: #e9f4f7; --paper-bg: #fdf5eb;
            --accent-red: #d46b54; --text-dark: #4a3b52;
        }
        
        /* Жесткая фиксация пропорций 16:9 на весь экран */
        body { 
            margin: 0; padding: 0; font-family: 'Nunito', sans-serif; 
            background-color: #2c3e50; color: var(--text-dark); 
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        
        .app-container {
            width: 100vw; max-width: calc(100vh * 16 / 9);
            height: 100vh; max-height: calc(100vw * 9 / 16);
            background: var(--bg-clouds);
            display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .header { background-color: var(--bg-top); padding: 10px; text-align: center; color: white; position: relative; flex-shrink: 0;}
        .header h1 { font-family: 'Caveat', cursive; font-size: 2rem; margin: 0; }

        /* Разделение на две колонки */
        .main-workspace { display: flex; flex: 1; overflow: hidden; }
        
        /* ЛЕВАЯ ПАНЕЛЬ (Настройки) */
        .left-panel {
            width: 50%; padding: 20px; overflow-y: auto;
            border-right: 2px dashed #b0c4de; box-sizing: border-box;
        }
        
        /* ПРАВАЯ ПАНЕЛЬ (Предпросмотр) */
        .right-panel {
            width: 50%; background: white; display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box;
        }

        .panel-section { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { color: var(--accent-red); margin: 0 0 10px 0; font-size: 1.1rem; border-bottom: 2px dashed #eee; padding-bottom: 5px;}
        
        .settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .settings-grid div { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; color: #555; }
        
        textarea, select, input { padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
        input[type="color"] { height: 35px; width: 100%; padding: 0; cursor: pointer; border: none; }
        
        button { background-color: var(--accent-red); color: white; border: none; padding: 8px 15px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-green { background-color: #4CAF50; width: 100%; padding: 12px; font-size: 1.1rem; margin-top: 10px;}

        #word-mapper { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
        .word-setup-card { background: var(--paper-bg); padding: 10px; border-radius: 8px; border: 1px solid #ddd; display: flex; align-items: center; gap: 10px;}
        .word-setup-card strong { font-size: 1.1rem; color: var(--accent-red); min-width: 100px;}
        .word-setup-card select { flex: 1; }

        /* Зона предпросмотра */
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0;}
        #copy-btn { padding: 12px 25px; font-size: 1.1rem; border-radius: 8px; background: #2196F3;}
        iframe { flex: 1; width: 100%; border: 3px solid #333; border-radius: 10px; background: #fff; }
        #code-output { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }
        
        /* Скроллбар для левой панели */
        .left-panel::-webkit-scrollbar { width: 8px; }
        .left-panel::-webkit-scrollbar-track { background: #f1f1f1; }
        .left-panel::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Конструктор: Синтаксический разбор</h1>
        </div>

        <div class="main-workspace">
            <!-- ЛЕВАЯ ПАНЕЛЬ -->
            <div class="left-panel">
                
                <div class="panel-section">
                    <h2>1. Дизайн</h2>
                    <div class="settings-grid">
                        <div><label>Фон:</label><input type="color" id="set-bg" value="#e9f4f7" onchange="generateGame()"></div>
                        <div><label>Кнопки:</label><input type="color" id="set-btn" value="#d46b54" onchange="generateGame()"></div>
                        <div><label>Кнопка Проверить:</label><input type="color" id="set-btn-check" value="#FF9800" onchange="generateGame()"></div>
                        <div><label>Шрифт:</label>
                            <select id="set-font" onchange="generateGame()">
                                <option value="'Nunito', sans-serif">Nunito</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Comfortaa', cursive">Comfortaa</option>
                                <option value="'Caveat', cursive">Caveat</option>
                                <option value="'Roboto', sans-serif">Roboto</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h2>2. Текст</h2>
                    <label>Введите предложение:</label>
                    <textarea id="sentence-input" rows="2" style="margin-bottom:10px;">Наступила золотая осень.</textarea>
                    <button onclick="parseWords()" style="width:100%;">Разбить на слова</button>
                    
                    <div id="step-words" style="display:none; margin-top:15px;">
                        <label>Роль и часть речи:</label>
                        <div id="word-mapper"></div>
                    </div>
                </div>

                <div class="panel-section">
                    <h2>3. Характеристики предложения</h2>
                    <div class="settings-grid">
                        <div><label>По цели:</label><select id="ans-celi" onchange="generateGame()"><option value="повествовательное">Повествовательное</option><option value="вопросительное">Вопросительное</option><option value="побудительное">Побудительное</option></select></div>
                        <div><label>По интонации:</label><select id="ans-int" onchange="generateGame()"><option value="невосклицательное">Невосклицательное</option><option value="восклицательное">Восклицательное</option></select></div>
                        <div><label>Грам. основы:</label><select id="ans-osnov" onchange="generateGame()"><option value="простое">Простое</option><option value="сложное">Сложное</option></select></div>
                        <div><label>Второстепенные:</label><select id="ans-raspr" onchange="generateGame()"><option value="распространённое">Распространённое</option><option value="нераспространённое">Нераспространённое</option></select></div>
                        <div><label>Главные члены:</label><select id="ans-chlen" onchange="toggleSubOdno(); generateGame()"><option value="двусоставное">Двусоставное</option><option value="односоставное">Односоставное</option></select></div>
                        <div id="sub-indigo-wrap" style="display:none;"><label>Тип односоставного:</label><select id="ans-sub" onchange="generateGame()"><option value="назывное">Назывное</option><option value="определённо-личное">Определённо-личное</option><option value="неопределённо-личное">Неопределённо-личное</option><option value="безличное">Безличное</option></select></div>
                    </div>
                </div>

                <button class="btn-green" onclick="generateGame()">Применить изменения</button>
            </div>

            <!-- ПРАВАЯ ПАНЕЛЬ -->
            <div class="right-panel">
                <div class="preview-header">
                    <h2>Предпросмотр</h2>
                    <button id="copy-btn" onclick="copyCode()">📋 Скопировать код</button>
                </div>
                <iframe id="preview-frame"></iframe>
                <textarea id="code-output" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        let wordsArray = [];
        const partsOfSpeech = ["имя существительное", "имя прилагательное", "имя числительное", "местоимение", "глагол", "причастие", "деепричастие", "наречие", "союз", "предлог", "частица", "междометие", "нет"];

        function parseWords() {
            let text = document.getElementById('sentence-input').value.trim();
            wordsArray = text.split(/\s+/);
            const mapper = document.getElementById('word-mapper');
            mapper.innerHTML = '';
            
            let posOptions = partsOfSpeech.map(p => `<option value="${p}">${p}</option>`).join('');

            wordsArray.forEach((word, index) => {
                mapper.innerHTML += `
                    <div class="word-setup-card">
                        <strong>${word}</strong>
                        <select id="role-${index}" onchange="generateGame()">
                            <option value="none">Нет роли</option>
                            <option value="subject">Подлежащее</option>
                            <option value="predicate">Сказуемое</option>
                            <option value="object">Дополнение</option>
                            <option value="attribute">Определение</option>
                            <option value="adverbial">Обстоятельство</option>
                        </select>
                        <select id="pos-${index}" onchange="generateGame()">
                            ${posOptions}
                        </select>
                    </div>
                `;
            });
            document.getElementById('step-words').style.display = 'block';
            
            if (text === "Наступила золотая осень.") {
                if (document.getElementById('role-0')) document.getElementById('role-0').value = "predicate";
                if (document.getElementById('pos-0')) document.getElementById('pos-0').value = "глагол";
                if (document.getElementById('role-1')) document.getElementById('role-1').value = "attribute";
                if (document.getElementById('pos-1')) document.getElementById('pos-1').value = "имя прилагательное";
                if (document.getElementById('role-2')) document.getElementById('role-2').value = "subject";
                if (document.getElementById('pos-2')) document.getElementById('pos-2').value = "имя существительное";
            }
            generateGame();
        }

        function toggleSubOdno() {
            const val = document.getElementById('ans-chlen').value;
            document.getElementById('sub-indigo-wrap').style.display = val === 'односоставное' ? 'block' : 'none';
        }

        function copyCode() {
            const code = document.getElementById('code-output');
            code.select();
            document.execCommand('copy');
            const btn = document.getElementById('copy-btn');
            btn.innerText = '✅ Скопировано!';
            btn.style.backgroundColor = '#4CAF50';
            setTimeout(() => { btn.innerText = '📋 Скопировать код'; btn.style.backgroundColor = '#2196F3'; }, 2000);
        }

        function generateGame() {
            if (wordsArray.length === 0) return;

            const correctData = { roles: {}, pos: {} };
            wordsArray.forEach((_, index) => {
                correctData.roles[index] = document.getElementById(`role-${index}`).value;
                correctData.pos[index] = document.getElementById(`pos-${index}`).value;
            });

            const config = {
                correct: correctData,
                chars: {
                    celi: document.getElementById('ans-celi').value,
                    int: document.getElementById('ans-int').value,
                    osnov: document.getElementById('ans-osnov').value,
                    raspr: document.getElementById('ans-raspr').value,
                    chlen: document.getElementById('ans-chlen').value,
                    sub: document.getElementById('ans-chlen').value === 'односоставное' ? document.getElementById('ans-sub').value : ''
                },
                styles: {
                    bg: document.getElementById('set-bg').value,
                    btn: document.getElementById('set-btn').value,
                    btnCheck: document.getElementById('set-btn-check').value,
                    font: document.getElementById('set-font').value
                }
            };

            const posOptionsHTML = `<option value="none">Часть речи...</option>` + partsOfSpeech.map(p => `<option value="${p}">${p}</option>`).join('');

            const wordsHtml = wordsArray.map((w, i) => `
                <div class="word-col">
                    <select class="student-pos" data-index="${i}">${posOptionsHTML}</select>
                    <span class="word-drop" data-index="${i}">${w}</span>
                </div>
            `).join('');

            const safeConfigString = JSON.stringify(config);

            const studentHTML = `<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;600;800&family=Montserrat:wght@500;700&family=Comfortaa:wght@700&family=Roboto:wght@400;500;700&display=swap&subset=cyrillic" rel="stylesheet">
<style>
    :root {
        --game-bg: ${config.styles.bg};
        --game-btn: ${config.styles.btn};
        --game-btn-check: ${config.styles.btnCheck};
        --game-font: ${config.styles.font};
    }
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        font-family: 'Nunito', sans-serif; 
        background: var(--game-bg); color: #333;
        box-sizing: border-box; overflow-x: hidden;
    }
    
    .game-container { padding: 20px; width: 100%; box-sizing: border-box; min-height: 100%; }
    
    .sentence-box { 
        background: rgba(255,255,255,0.9); padding: 25px 15px; border-radius: 15px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; 
        display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; align-items: flex-end;
    }
    .word-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    
    .student-pos { 
        font-family: var(--game-font), sans-serif; font-size: 0.8rem; padding: 3px; 
        border: 1px solid #ccc; border-radius: 5px; max-width: 120px; outline:none; 
    }
    .student-pos.correct { background: #c8e6c9; border-color: #4CAF50; }
    .student-pos.wrong { background: #ffcdd2; border-color: #f44336; }
    
    .word-drop { 
        font-family: var(--game-font), sans-serif; padding: 2px 5px; border-radius: 5px; 
        display: inline-block; border: 2px solid transparent; cursor: pointer; font-size: 1.4rem; 
    }
    
    .ans-subject { border-bottom: 2px solid #333; border-radius:0; }
    .ans-predicate { border-bottom: 4px double #333; border-radius:0; }
    .ans-object { border-bottom: 2px dashed #333; border-radius:0; }
    .ans-attribute { text-decoration: underline wavy #333 2px; text-underline-offset: 4px; border: none; }
    .ans-adverbial { background-image: repeating-linear-gradient(to right, #333 0, #333 8px, transparent 8px, transparent 12px, #333 12px, #333 16px, transparent 16px, transparent 20px); background-position: bottom; background-size: 100% 2px; background-repeat: no-repeat; padding-bottom: 4px; border: none; }
    
    .word-drop.correct-line { color: #1b5e20 !important; }
    .word-drop.ans-subject.correct-line, .word-drop.ans-predicate.correct-line, .word-drop.ans-object.correct-line { border-bottom-color: #4CAF50 !important; }
    .word-drop.ans-attribute.correct-line { text-decoration-color: #4CAF50 !important; }
    .word-drop.ans-adverbial.correct-line { background-image: repeating-linear-gradient(to right, #4CAF50 0, #4CAF50 8px, transparent 8px, transparent 12px, #4CAF50 12px, #4CAF50 16px, transparent 16px, transparent 20px) !important; }
    
    @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    .error-shake { animation: shake 0.4s; background: rgba(244, 67, 54, 0.2) !important; border-radius: 5px !important;}

    .drag-tools { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .drag-item { background: white; padding: 8px 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: grab; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.9rem; font-weight: bold; border: 1px solid #eee; user-select: none; touch-action: none; z-index: 10;}
    .drag-clone { position: absolute !important; pointer-events: none !important; z-index: 9999; margin:0;}
    .demo-line { width: 40px; height: 10px; margin-top: 2px;}

    .accordion-btn { 
        background: var(--game-btn); color: white; border: none; padding: 12px 20px; border-radius: 25px; 
        font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; max-width: 400px; margin: 0 auto 15px auto; display: block;
    }
    .accordion-content { background: rgba(255,255,255,0.9); border-radius: 12px; padding: 15px; display: none; margin-bottom: 15px; }
    .accordion-content.show { display: block; }

    .char-row { margin-bottom: 12px; }
    .char-title { font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
    .tags-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn { background: white; border: 2px solid #ddd; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
    .tag-btn.selected { background: #e3f2fd; border-color: #2196F3; color: #1565C0; }
    .tag-btn.correct-tag { background: #4CAF50 !important; border-color: #4CAF50 !important; color: white !important; }
    .tag-btn.wrong-tag { background: #f44336 !important; border-color: #f44336 !important; color: white !important; }

    #sub-odno { display: none; margin-top: 10px; padding: 10px; border-left: 3px solid var(--game-btn); }
    #sub-odno.show { display: block; }

    /* ФИКС ДЛЯ GENIALLY: Canvas имеет жесткий размер внутри, но растягивается через CSS */
    .canvas-container { background: rgba(255,255,255,0.9); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px;}
    .canvas-wrapper { width: 100%; max-width: 600px; margin: 10px auto 0 auto; position: relative; }
    canvas { 
        width: 100%; height: 120px; /* CSS размеры */
        border: 2px dashed #ccc; border-radius: 8px; background: white; 
        cursor: crosshair; touch-action: none; display: block;
    }
    
    .check-btn { background: var(--game-btn-check); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: block; margin: 0 auto; }
</style>
</head>
<body>

<div class="game-container">
    <div class="sentence-box">${wordsHtml}</div>

    <p style="text-align:center; font-size:0.85rem; color:#666;">Перетащите плашку на слово для разбора</p>
    <div class="drag-tools">
        <div class="drag-item" data-role="subject">Подлежащее <div class="demo-line ans-subject"></div></div>
        <div class="drag-item" data-role="predicate">Сказуемое <div class="demo-line ans-predicate"></div></div>
        <div class="drag-item" data-role="object">Дополнение <div class="demo-line ans-object"></div></div>
        <div class="drag-item" data-role="attribute">Определение <div class="demo-line ans-attribute"></div></div>
        <div class="drag-item" data-role="adverbial">Обстоятельство <div class="demo-line ans-adverbial"></div></div>
    </div>

    <button class="accordion-btn" onclick="toggleAcc()">Характеристики предложения ▼</button>

    <div class="accordion-content" id="char-panel">
        <div class="char-row">
            <div class="char-title">Цель высказывания:</div>
            <div class="tags-group" data-category="celi"><button class="tag-btn" onclick="selectTag(this, 'повествовательное')">Повествовательное</button><button class="tag-btn" onclick="selectTag(this, 'вопросительное')">Вопросительное</button><button class="tag-btn" onclick="selectTag(this, 'побудительное')">Побудительное</button></div>
        </div>
        <div class="char-row">
            <div class="char-title">Интонация:</div>
            <div class="tags-group" data-category="int"><button class="tag-btn" onclick="selectTag(this, 'восклицательное')">Восклицательное</button><button class="tag-btn" onclick="selectTag(this, 'невосклицательное')">Невосклицательное</button></div>
        </div>
        <div class="char-row">
            <div class="char-title">Основы:</div>
            <div class="tags-group" data-category="osnov"><button class="tag-btn" onclick="selectTag(this, 'простое')">Простое</button><button class="tag-btn" onclick="selectTag(this, 'сложное')">Сложное</button></div>
        </div>
        <div class="char-row">
            <div class="char-title">Второстепенные члены:</div>
            <div class="tags-group" data-category="raspr"><button class="tag-btn" onclick="selectTag(this, 'распространённое')">Распространённое</button><button class="tag-btn" onclick="selectTag(this, 'нераспространённое')">Нераспространённое</button></div>
        </div>
        <div class="char-row">
            <div class="char-title">Главные члены:</div>
            <div class="tags-group" data-category="chlen"><button class="tag-btn" onclick="selectTag(this, 'двусоставное', true)">Двусоставное</button><button class="tag-btn" onclick="selectTag(this, 'односоставное', true)">Односоставное</button></div>
            <div id="sub-odno"><div class="char-title">Тип односоставного:</div><div class="tags-group" data-category="sub"><button class="tag-btn" onclick="selectTag(this, 'назывное')">Назывное</button><button class="tag-btn" onclick="selectTag(this, 'определённо-личное')">Определённо-личное</button><button class="tag-btn" onclick="selectTag(this, 'неопределённо-личное')">Неопределённо-личное</button><button class="tag-btn" onclick="selectTag(this, 'безличное')">Безличное</button></div></div>
        </div>
    </div>

    <div class="canvas-container">
        <div class="char-title">Нарисуйте схему предложения:</div>
        <div class="canvas-wrapper">
            <!-- Жесткие атрибуты width/height предотвращают баг Genially с 0 размером -->
            <canvas id="schemeCanvas" width="800" height="200"></canvas>
        </div>
        <button onclick="clearCanvas()" style="margin-top:10px; padding:5px 15px; border-radius:10px; border:1px solid #ccc; cursor:pointer;">Очистить</button>
    </div>

    <button class="check-btn" onclick="checkAllAnswers()">Проверить</button>
</div>

<script>
    const CONFIG = ${safeConfigString};
    let selectedAnswers = { celi: '', int: '', osnov: '', raspr: '', chlen: '', sub: '' };

    function toggleAcc() { document.getElementById('char-panel').classList.toggle('show'); }

    function selectTag(btn, value, isChlen = false) {
        const group = btn.closest('.tags-group');
        const category = group.getAttribute('data-category');
        group.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedAnswers[category] = value;
        if (isChlen) {
            const subPanel = document.getElementById('sub-odno');
            if (value === 'односоставное') { subPanel.classList.add('show'); } 
            else { subPanel.classList.remove('show'); selectedAnswers.sub = ''; subPanel.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected')); }
        }
    }

    /* Исправленный Drag & Drop для Genially */
    let draggedItem = null, dragClone = null;
    document.querySelectorAll('.drag-item').forEach(drag => {
        drag.addEventListener('pointerdown', (e) => {
            e.preventDefault(); draggedItem = drag;
            dragClone = drag.cloneNode(true);
            dragClone.classList.add('drag-clone');
            document.body.appendChild(dragClone);
            moveClone(e);
            document.addEventListener('pointermove', moveClone);
            document.addEventListener('pointerup', dropItem);
        });
    });

    function moveClone(e) {
        if (!dragClone) return;
        // Используем clientX/Y для работы внутри iframe без смещений
        dragClone.style.left = (e.clientX - dragClone.offsetWidth / 2) + 'px';
        dragClone.style.top = (e.clientY - dragClone.offsetHeight / 2) + 'px';
    }

    function dropItem(e) {
        document.removeEventListener('pointermove', moveClone);
        document.removeEventListener('pointerup', dropItem);
        if (!dragClone) return;
        dragClone.style.display = 'none';
        const elemBelow = document.elementFromPoint(e.clientX, e.clientY);
        if (elemBelow && elemBelow.classList.contains('word-drop')) {
            const role = draggedItem.getAttribute('data-role');
            elemBelow.className = 'word-drop ans-' + role;
            elemBelow.setAttribute('data-user-role', role);
        }
        dragClone.remove(); dragClone = null; draggedItem = null;
    }

    document.querySelectorAll('.word-drop').forEach(drop => {
        drop.addEventListener('click', () => { drop.className = 'word-drop'; drop.removeAttribute('data-user-role'); });
    });

    function checkAllAnswers() {
        document.querySelectorAll('.word-drop').forEach(drop => {
            const index = drop.getAttribute('data-index');
            const correctRole = CONFIG.correct.roles[index];
            const userRole = drop.getAttribute('data-user-role') || 'none';
            if (correctRole !== 'none' && userRole === correctRole) {
                drop.classList.add('correct-line'); 
            } else if (userRole !== 'none' || (correctRole !== 'none' && userRole === 'none')) {
                drop.classList.remove('ans-'+userRole); drop.removeAttribute('data-user-role');
                drop.classList.add('error-shake'); setTimeout(() => drop.classList.remove('error-shake'), 400);
            }
        });

        document.querySelectorAll('.student-pos').forEach(select => {
            const index = select.getAttribute('data-index');
            select.classList.remove('correct', 'wrong');
            if (select.value === CONFIG.correct.pos[index]) { select.classList.add('correct'); select.disabled = true; } 
            else { select.classList.add('wrong'); }
        });

        Object.keys(CONFIG.chars).forEach(cat => {
            if (cat === 'sub' && CONFIG.chars.chlen !== 'односоставное') return;
            const group = document.querySelector('.tags-group[data-category="'+cat+'"]');
            if (!group) return;
            const selectedBtn = group.querySelector('.tag-btn.selected');
            if (selectedAnswers[cat] === CONFIG.chars[cat]) {
                if (selectedBtn) { selectedBtn.classList.remove('selected'); selectedBtn.classList.add('correct-tag'); } 
                else { Array.from(group.querySelectorAll('.tag-btn')).find(b => b.innerText.toLowerCase() === CONFIG.chars[cat].toLowerCase())?.classList.add('correct-tag'); }
            } else if (selectedBtn) {
                selectedBtn.classList.remove('selected'); selectedBtn.classList.add('wrong-tag');
                setTimeout(() => selectedBtn.classList.remove('wrong-tag'), 1000);
            }
        });
    }

    /* Исправленный Canvas для Genially */
    const canvas = document.getElementById('schemeCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Настраиваем кисть толще, так как внутреннее разрешение больше CSS-размера
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#333';

    // Высчитываем координаты с учетом масштаба CSS относительно внутренних атрибутов width/height
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        return { 
            x: (clientX - rect.left) * scaleX, 
            y: (clientY - rect.top) * scaleY 
        };
    }

    function startDraw(e) {
        isDrawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        if(e.type.includes('touch')) e.preventDefault();
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        if(e.type.includes('touch')) e.preventDefault();
    }

    function stopDraw() { isDrawing = false; }
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    canvas.addEventListener('pointerdown', startDraw);
    canvas.addEventListener('pointermove', draw);
    canvas.addEventListener('pointerup', stopDraw);
    canvas.addEventListener('pointerout', stopDraw);
    // Для мобильных (prevent scroll)
    canvas.addEventListener('touchstart', startDraw, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDraw);
